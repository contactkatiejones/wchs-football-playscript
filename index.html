<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteland Warriors — Practice Script</title>
<style>
/* ═══════════════════════════════════════════════════════
   WHITELAND FOOTBALL — NFL-STYLE PRACTICE SCRIPT
   Inspired by actual NFL ops room aesthetics:
   • Light background / dark ink (like printed scripts)
   • Hard ruled lines, zero border-radius on data tables
   • Condensed athletic headers (Bebas Neue)
   • Dense information layout with strict typographic grid
   • Warriors brand: Royal blue #1a3fa8 + Orange #e85c00
   ═══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');

:root {
  /* Warriors brand */
  --royal:      #1a3fa8;
  --royal-dark: #122d80;
  --royal-mid:  #2555d4;
  --royal-lite: #5585f8;
  --orange:     #e85c00;
  --orange-mid: #ff7320;
  --orange-lite: #ffaa60;

  /* App chrome — light mode like real NFL scripts */
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --surface2: #f4f6fa;
  --surface3: #e8edf5;

  /* Ink */
  --ink:      #0d1117;
  --ink2:     #000;
  --ink3:     #000;
  --ink4:     #333;

  /* Borders — sharp, like printed ruled lines */
  --rule:     #d0d6e4;
  --rule2:    #b8c0d4;
  --rule3:    #9098b0;

  /* Position accent colors — NFL depth-chart feel */
  --qb:   #1a3fa8; --qb-bg:   #dce6ff;
  --rb:   #e85c00; --rb-bg:   #ffe8d6;
  --wr:   #2555d4; --wr-bg:   #dde8ff;
  --te:   #bf4800; --te-bg:   #ffd9c0;
  --ol:   #0d2e80; --ol-bg:   #cdd8f8;
  --dl:   #c74400; --dl-bg:   #ffd0b8;
  --lb:   #1e4ec8; --lb-bg:   #d8e4ff;
  --db:   #a83a00; --db-bg:   #ffe0c8;
  --kp:   #556080; --kp-bg:   #e4e8f4;
  --st:   #284ea0; --st-bg:   #d8e2f8;

  /* Period stripe colors */
  --indy:       #1a3fa8; --indy-bg:   #dce6ff; --indy-stripe: #1a3fa8;
  --combo:      #e85c00; --combo-bg:  #ffe8d6; --combo-stripe: #e85c00;
  --team:       #0d2e80; --team-bg:   #cdd8f8; --team-stripe:  #0d2e80;
  --tempo:      #556080; --tempo-bg:  #e8edf5; --tempo-stripe: #7a8399;

  /* Accent */
  --accent:     #1a3fa8;
  --accent-dim: rgba(26,63,168,0.08);
  --accent-hover: #122d80;

  /* Status */
  --red:    #c0392b; --red-bg:   rgba(192,57,43,0.1);
  --green:  #1a7a40; --green-bg: rgba(26,122,64,0.1);

  --font-display: 'Bebas Neue', sans-serif;
  --font-head:    'Inter', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-mono:    'Roboto Mono', monospace;

  --radius: 2px;
  --radius-lg: 4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--rule2); border-radius: 2px; }

/* ══════════════════════════════════════════════════════
   LOGIN SCREEN
   ══════════════════════════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
  padding: 2rem;
  background: var(--royal-dark);
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.03) 39px,
      rgba(255,255,255,0.03) 40px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.03) 39px,
      rgba(255,255,255,0.03) 40px
    );
}

/* Orange top stripe on login */
#login-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--orange) 0%, var(--orange-mid) 100%);
}

.login-logo {
  font-family: var(--font-display);
  font-size: 52px;
  letter-spacing: 5px;
  color: #ffffff;
  text-align: center;
  line-height: 1;
}
.login-logo span { color: var(--orange-mid); }
.login-sub {
  font-family: var(--font-head);
  font-size: 14px;
  letter-spacing: .04em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}
.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 600px;
  width: 100%;
}
@media(max-width:480px){ .role-grid { grid-template-columns: repeat(2,1fr); } }
.role-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 0;
  border-top: 3px solid transparent;
  padding: 20px 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  color: #fff;
}
.role-card:hover {
  background: rgba(255,255,255,0.1);
  border-top-color: var(--orange-mid);
}
.role-card.selected {
  background: rgba(232,92,0,0.15);
  border-color: rgba(255,255,255,0.2);
  border-top-color: var(--orange);
}
.role-card-hc {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-top: 4px solid var(--orange);
  padding: 22px 20px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  color: #fff;
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.role-card-hc:hover { background: rgba(255,255,255,0.12); }
.role-card-hc.selected { background: rgba(232,92,0,0.2); border-color: var(--orange); }
.role-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto 10px; }
.role-dot-hc { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.role-name {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: .05em;
  color: #fff;
}
.role-name-hc {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: .06em;
  color: #fff;
}
.role-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; font-family: var(--font-head); letter-spacing: .06em; }
.login-btn {
  padding: 13px 48px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: .15em;
  cursor: pointer;
  opacity: 0.35;
  transition: all .15s;
  text-transform: uppercase;
}
.login-btn.active { opacity: 1; }
.login-btn.active:hover { background: var(--orange-mid); }

/* ══════════════════════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════════════════════ */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.topbar {
  height: 48px;
  background: var(--royal-dark);
  border-bottom: 3px solid var(--orange);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 14px;
  flex-shrink: 0;
}
.topbar-logo {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 2px;
  line-height: 1;
  color: #ffffff;
}
.topbar-logo span { color: var(--orange-mid); }
.topbar-day {
  font-family: var(--font-display);
  font-size: 14px;
  color: #fff;
  background: transparent;
  padding: 3px 10px;
  border: 1px solid rgba(255,255,255,0.8);
  letter-spacing: .1em;
}
.topbar-spacer { flex: 1; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #6ee8a0;
  letter-spacing: .08em;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #6ee8a0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.presence-avatars { display: flex; }
.presence-av {
  width: 28px; height: 28px;
  border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 11px;
  border: 1px solid rgba(255,255,255,0.2);
  margin-left: -1px;
  cursor: default;
  position: relative;
}
.presence-av:first-child { margin-left: 0; }
.presence-av[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: -26px; left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 9px; font-family: var(--font-body);
  background: var(--ink); color: #fff;
  padding: 3px 7px;
  pointer-events: none;
  z-index: 10;
}
.role-badge {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .1em;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

/* Firebase badge */
#fbStatus {
  font-size: 9px !important;
  font-family: var(--font-mono) !important;
  padding: 3px 8px !important;
  background: rgba(110,232,160,0.12) !important;
  color: #6ee8a0 !important;
  border: 1px solid rgba(110,232,160,0.25) !important;
  letter-spacing: .06em;
}

/* ══════════════════════════════════════════════════════
   MAIN LAYOUT
   ══════════════════════════════════════════════════════ */
.main { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 176px;
  background: var(--royal-dark);
  border-right: 3px solid var(--orange);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-section {
  padding: 10px 12px 3px;
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .08em;
  color: rgba(255,255,255,0.45);
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 2px;
  text-transform: uppercase;
}
.sidebar-section:first-child { margin-top: 0; border-top: none; }
.sidebar-item {
  padding: 6px 12px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,0.65);
  border-left: 3px solid transparent;
  transition: all .12s;
}
.sidebar-item:hover { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.07); }
.sidebar-item.active {
  color: #fff;
  border-left-color: var(--orange);
  background: rgba(232,92,0,0.18);
}
.day-item {
  padding: 5px 12px 5px 16px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  transition: all .12s;
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid transparent;
  letter-spacing: 0;
}
.day-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); }
.day-item.active { color: #fff; border-left-color: var(--orange-mid); background: rgba(255,255,255,0.05); }


/* ══════════════════════════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════════════════════════ */
.content {
  flex: 1; overflow: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--bg);
}

.content-header {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--royal);
}
.content-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--royal-dark);
}
.content-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #000;
  letter-spacing: .02em;
  background: var(--surface2);
  padding: 3px 8px;
  border: 1px solid var(--rule);
}

/* ══════════════════════════════════════════════════════
   STATS BAR — NFL-style scoreboard tiles
   ══════════════════════════════════════════════════════ */
.stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--rule2); border: 1px solid var(--rule2); }
@media(max-width:500px){ .stats-bar { grid-template-columns: repeat(2,1fr); } }
.stat-card {
  background: var(--surface);
  padding: 12px 14px;
  border-top: 3px solid var(--royal);
}
.stat-card:nth-child(even) { border-top-color: var(--orange); }
.stat-label {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--ink3);
  margin-bottom: 2px;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--ink);
  line-height: 1;
}
.stat-sub { font-size: 10px; color: var(--ink4); margin-top: 2px; font-family: var(--font-body); }

/* ══════════════════════════════════════════════════════
   SCRIPT TABLE — hard-ruled, NFL ops sheet style
   ══════════════════════════════════════════════════════ */
.script-wrap {
  overflow-x: auto;
  border: 1px solid var(--rule2);
  background: var(--surface);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.script-table { width: 100%; border-collapse: collapse; min-width: 900px; }
.script-table th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--royal-dark);
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .14em;
  color: rgba(255,255,255,0.7);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 2px solid var(--orange);
  border-right: 1px solid rgba(255,255,255,0.1);
  white-space: nowrap;
}
.script-table th:last-child { border-right: none; }
.script-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  vertical-align: middle;
  font-size: 12px;
  background: var(--surface);
}
.script-table td:last-child { border-right: none; }
.script-table tr:last-child td { border-bottom: none; }
.script-table tr:hover td { background: var(--surface2); }
/* Alternating row tint */
.script-table tr:nth-child(even) td { background: #fafbfd; }
.script-table tr:nth-child(even):hover td { background: var(--surface2); }

.time-cell {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink2);
  white-space: nowrap;
}

/* Period pills — hard rectangular, NFL-ops style */
.period-pill {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .08em;
  white-space: nowrap;
}
.pill-indy  { background: var(--indy-bg);  color: var(--indy);  border-left: 3px solid var(--indy);  }
.pill-combo { background: var(--combo-bg); color: var(--combo); border-left: 3px solid var(--combo); }
.pill-team  { background: var(--team-bg);  color: var(--team);  border-left: 3px solid var(--team);  }
.pill-tempo { background: var(--tempo-bg); color: var(--tempo-stripe); border-left: 3px solid var(--tempo-stripe); }

/* Drill input — looks like a form field on a printed sheet */
.drill-input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  padding: 3px 5px;
  font-size: 11px;
  color: var(--ink);
  font-family: var(--font-body);
  transition: all .1s;
  min-width: 90px;
}
.drill-input:hover { border-color: var(--rule2); background: #f0f4ff; }
.drill-input:focus { outline: none; border-color: var(--royal-mid); background: #e8f0ff; }
.drill-input:disabled { color: var(--ink3); cursor: default; }
.drill-input.peer-editing { border-color: var(--orange); background: rgba(232,92,0,0.04); }
.drill-input.my-group { color: var(--ink); font-weight: 500; }
.changed-cell { background: rgba(232,92,0,0.04) !important; }

.cell-multi { display: flex; align-items: center; gap: 5px; }
.comment-badge {
  flex-shrink: 0;
  background: var(--orange);
  color: #fff;
  font-size: 9px;
  padding: 1px 5px;
  font-family: var(--font-display);
  letter-spacing: .06em;
  cursor: pointer;
  white-space: nowrap;
}

/* Position header badges */
.pos-th { text-align: center !important; }
.pos-th-badge {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: .06em;
  border-bottom: 2px solid currentColor;
}

/* ══════════════════════════════════════════════════════
   ACTIVITY FEED
   ══════════════════════════════════════════════════════ */
.activity-feed {
  background: var(--surface);
  border: 1px solid var(--rule2);
  overflow: hidden;
}
.feed-header {
  padding: 8px 12px;
  border-bottom: 2px solid var(--royal);
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .1em;
  color: var(--royal-dark);
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
}
.feed-item {
  padding: 7px 12px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 11px;
  animation: slideIn .25s ease;
}
.feed-item:last-child { border-bottom: none; }
@keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.feed-av {
  width: 22px; height: 22px;
  border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  flex-shrink: 0;
  font-family: var(--font-display);
  letter-spacing: .04em;
}
.feed-text { flex: 1; color: var(--ink3); line-height: 1.4; }
.feed-text b { color: var(--ink); }
.feed-time { font-family: var(--font-mono); font-size: 9px; color: var(--ink4); flex-shrink: 0; }

/* ══════════════════════════════════════════════════════
   FILTER BAR & PLAYER GRID
   ══════════════════════════════════════════════════════ */
.filter-bar { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 4px 12px;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: .06em;
  border: 1px solid var(--rule2);
  background: var(--surface);
  color: var(--ink3);
  cursor: pointer;
  transition: all .1s;
  border-bottom: 2px solid transparent;
}
.filter-btn:hover { color: var(--ink); border-bottom-color: var(--royal-mid); }
.filter-btn.active {
  color: var(--royal-dark);
  background: var(--surface2);
  border-bottom-color: var(--orange);
  font-weight: 600;
}

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.player-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-top: 3px solid var(--rule2);
  padding: 11px 13px;
  transition: border-top-color .12s;
}
.player-card:hover { border-top-color: var(--royal-mid); }
.pc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.pc-num {
  font-family: var(--font-display);
  font-size: 14px;
  color: #000;
  min-width: 28px;
  letter-spacing: .04em;
}
.pc-name { font-size: 13px; font-weight: 600; flex: 1; color: var(--ink); font-family: var(--font-head); }
.pc-pos {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .06em;
  padding: 1px 6px;
  border-radius: 0;
}
.pc-weak { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
.weak-tag {
  font-size: 9px; padding: 1px 5px;
  background: rgba(192,57,43,0.1);
  color: #c0392b;
  font-family: var(--font-mono);
  border-left: 2px solid #c0392b;
}
.no-weak { font-size: 10px; color: var(--ink4); font-family: var(--font-mono); }
.pc-drill {
  font-size: 10px; color: var(--ink2);
  padding: 3px 7px;
  background: var(--surface2);
  border-left: 3px solid var(--indy);
  margin-top: 3px;
  line-height: 1.4;
  font-family: var(--font-body);
}
.pc-drill.focus { border-left-color: var(--orange); color: var(--orange); }

/* ══════════════════════════════════════════════════════
   SIDELINE VIEW
   ══════════════════════════════════════════════════════ */

// ── Firebase helpers ────────────────────────────────────────────────────────
// All paths live under /playscript/ so the database stays tidy
// if you reuse a Firebase project for other things.

function fbSet(path, value) {
  if (!db) return Promise.resolve();
  return set(ref(db, 'playscript/' + path), value);
}
function fbUpdate(path, value) {
  if (!db) return Promise.resolve();
  return update(ref(db, 'playscript/' + path), value);
}
function fbPush(path, value) {
  if (!db) return Promise.resolve();
  return push(ref(db, 'playscript/' + path), value);
}
function fbOn(path, event, cb) {
  if (!db) return;
  onValue(ref(db, 'playscript/' + path), snap => cb(snap.val()));
}
function fbOnce(path, cb) {
  if (!db) return;
  get(ref(db, 'playscript/' + path)).then(snap => cb(snap.val()));
}
function fbRemove(path) {
  if (!db) return;
  remove(ref(db, 'playscript/' + path));
}
// Presence: mark user online, auto-remove on disconnect
function fbPresence(roleId, roleName, color) {
  if (!db) return;
  const presRef = ref(db, 'playscript/presence/' + roleId);
  set(presRef, { id: roleId, name: roleName, color, online: true, ts: Date.now() });
  // onDisconnect is not available in modular SDK the same way — use remove on beforeunload instead
  window.addEventListener('beforeunload', () => remove(presRef));
}

const POS_SKILLS={QB:['footwork','drop mechanics','pocket presence','reading defenses','short passing','intermediate passing','deep ball','RPO reads'],RB:['ball security','vision & burst','pass blocking','receiving','route running','blitz pickup','contact balance'],WR:['route running','releases','hand catching','YAC','blocking','go routes','body control','contested catches'],TE:['blocking technique','release vs LB','route running','hand catching','seam routes','red zone'],OL:['stance & start','pass protection','run blocking','footwork','combo blocks','pulling technique','hand placement'],DL:['first step quickness','hand fighting','gap responsibility','pass rush moves','pursuit angles','tackling','stunts'],LB:['key & read','pass drops','blitz technique','tackling','pursuit','coverage vs TE','sideline speed'],DB:['backpedal','hip flip','zone coverage','man coverage','press technique','ball skills','tackling in space'],'K/P':['approach & plant','contact point','hang time','direction','kickoff depth','punting form','snapper timing'],ST:['coverage lanes','gunner technique','return blocking','kickoff approach','punt return vision','wedge setting']};

// ── ACTIVITY ───────────────────────────────────────────────────────────────
function pushActivity(coach, text, color, roleId) {
  const now = new Date();
  const entry = {
    coach, text, color,
    roleId: roleId || currentRole,
    time: `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`
  };
  // Always add to local log immediately
  activityLog.unshift(entry);
  if (activityLog.length > 8) activityLog.pop();
  const feed = document.getElementById('activityFeed');
  if (feed) renderFeed(feed);
  // Push to Firebase so other coaches see it
  if (FIREBASE_READY) {
    fbPush('activity', entry);
    // Trim old entries (keep last 50) — lightweight cleanup
    get(ref(db, 'playscript/activity')).then(snap => {
      const keys = snap.val() ? Object.keys(snap.val()) : [];
      if (keys.length > 50) {
        keys.slice(0, keys.length - 50).forEach(k =>
          remove(ref(db, 'playscript/activity/' + k))
        );
      }
    });
  }
}

// Keep old name working for any internal calls
function addActivity(coach, text, color) {
  pushActivity(coach, text, color, currentRole);
}

function doLogout(){
  if(db) remove(ref(db, 'playscript/presence/'+currentRole));
  if(sidelineInterval) { clearInterval(sidelineInterval); sidelineInterval = null; }
  selectedRoleId=null;
  currentRole='';
  currentView='script';
  // Revert injected HC nav items back to placeholders for next login
  const rn = document.getElementById('nav-roster');
  if (rn) rn.outerHTML = '<div id="nav-roster-placeholder"></div>';
  const sn = document.getElementById('nav-schedule');
  if (sn) sn.outerHTML = '<div id="nav-schedule-placeholder"></div>';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.querySelectorAll('.role-card, .role-card-hc').forEach(c=>c.classList.remove('selected'));
  document.getElementById('loginBtn').classList.remove('active');
}

function doLogin(){
  if(!selectedRoleId) return;
  currentRole=selectedRoleId;
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');
  app.classList.add('visible');
  const r=ROLES.find(x=>x.id===selectedRoleId);
  const badge=document.getElementById('roleBadge');
  badge.textContent=r.label;
  badge.style.color='#ffffff';
  badge.style.borderColor='rgba(255,255,255,0.25)';
  badge.style.borderLeftColor=r.color;
  badge.style.borderLeftWidth='3px';

  // ── Firebase: announce presence ──────────────────────────────────────────
  fbPresence(r.id, r.label, r.color);

  // ── Firebase: listen for presence changes from all coaches ───────────────
  fbOn('presence', 'value', (data) => {
    onlineCoaches = data ? Object.values(data) : [];
    renderPresence();
  });

  // ── Firebase: listen for drill edits from other coaches ──────────────────
  fbOn('script', 'value', (data) => {
    if (!data) return;
    // Merge remote data into local scriptData
    Object.entries(data).forEach(([day, periods]) => {
      if (!scriptData[day]) return;
      Object.entries(periods).forEach(([ri, posMap]) => {
        if (!scriptData[day][ri]) return;
        Object.entries(posMap).forEach(([pos, val]) => {
          if (scriptData[day][ri][pos] !== val) {
            scriptData[day][ri][pos] = val;
            // Only re-render if we're currently viewing that day/script
            if (currentView === 'script' && currentDay === day) {
              render();
            }
          }
        });
      });
    });
  });

  // ── Firebase: listen for activity feed entries ───────────────────────────
  fbOn('activity', 'child_added', (item) => {
    if (!item) return;
    // Don't duplicate our own entries (already in local log)
    if (item.roleId === currentRole) return;
    activityLog.unshift(item);
    if (activityLog.length > 8) activityLog.pop();
    const feed = document.getElementById('activityFeed');
    if (feed) renderFeed(feed);
  });

  // ── Push our join event ──────────────────────────────────────────────────
  pushActivity(r.label, 'joined the session', r.color, r.id);

  // ── Seed Firebase with default script data if nothing exists yet ─────────
  if (FIREBASE_READY) {
    get(ref(db, 'playscript/script')).then(snap => {
      if (!snap.exists()) {
        set(ref(db, 'playscript/script'), scriptData);
      }
    });
    // Load saved schedule if one exists
    get(ref(db, 'playscript/schedule')).then(snap => {
      if (snap.exists() && Array.isArray(snap.val())) {
        SCHEDULE.length = 0;
        snap.val().forEach(s => SCHEDULE.push(s));
        if (currentView === 'script') render();
      }
    });
    initRoster();
    initSidelineSync();
  }

  // Show Firebase sync badge if configured
  renderPresence();

  // Build HC-only nav items directly in the DOM
  if (currentRole === 'HC') {
    const rp = document.getElementById('nav-roster-placeholder');
    const sp = document.getElementById('nav-schedule-placeholder');
    if (rp) rp.outerHTML = '<div class="sidebar-item" onclick="window.setView(\'roster\')" id="nav-roster">Edit Roster</div>';
    if (sp) sp.outerHTML = '<div class="sidebar-item" onclick="window.setView(\'schedule\')" id="nav-schedule">Edit Schedule</div>';
  }
  setView('script');
  if (!FIREBASE_READY) startPeerActivity();
  // Ask for push notification permission
  setTimeout(requestPushPermission, 2000);
}

// Track online coaches from Firebase
let onlineCoaches = [];

// ── PRESENCE ──────────────────────────────────────────────────────────────
function renderPresence(){
  const el=document.getElementById('presenceAvatars');
  // Use live Firebase presence if available, else fall back to peer list
  const coaches = FIREBASE_READY
    ? onlineCoaches.filter(p => p.id !== currentRole).slice(0, 6)
    : PEER_COACHES.filter(p => p.id !== currentRole).slice(0, 5);
  el.innerHTML = coaches.map(p =>
    `<div class="presence-av" style="background:${safeColorBg(p.color)};color:${p.color}" title="${p.name}">${p.id.slice(0,2)}</div>`
  ).join('');
  // Update live count
  const liveCount = document.getElementById('statCoachCount');
  if (liveCount) liveCount.textContent = coaches.length + 1;
}

// ── PEER ACTIVITY SIM ──────────────────────────────────────────────────────

// ── NAVIGATION ────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (!sidebar) return;
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('visible', !isOpen);
}

function setView(v){
  currentView=v;
  ['script','mygroup','players','sideline','roster','schedule'].forEach(n=>{
    document.getElementById('nav-'+n)?.classList.toggle('active',n===v);
  });
  // Auto-close sidebar on mobile after selecting a view
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('visible');
  render();
}
function setDay(day,el){
  currentDay=day;
  document.querySelectorAll('.day-item').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  const DAY_NAMES={'Mon':'MONDAY','Tue':'TUESDAY','Wed':'WEDNESDAY','Thu':'THURSDAY','Fri':'FRIDAY','Sat':'SATURDAY','Sun':'SUNDAY'};
  document.getElementById('topbarDay').textContent=(DAY_NAMES[day]||day);
  // Auto-close sidebar on mobile
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('visible');
  render();
}

function render(){
  const el=document.getElementById('mainContent');
  if(currentView==='script')       renderScript(el);
  else if(currentView==='mygroup') renderMyGroup(el);
  else if(currentView==='players') renderPlayers(el);
  else if(currentView==='sideline') renderSideline(el);
  else if(currentView==='roster')  renderRosterEditor(el);
  else if(currentView==='schedule') renderScheduleEditor(el);
}

// ── SIDELINE VIEW — clock-anchored real-time ──────────────────────────────

// Convert "3:40" time string to minutes since midnight
function timeStrToMins(t) {
  const parts = t.split(':').map(Number);
  return parts[0] * 60 + (parts[1] || 0);
}

// Given practiceStartTime (ms), return {periodIdx, secsLeft, secsDone, totalSecs}
function calcCurrentPeriod(startMs) {
  const elapsedSecs = Math.floor((Date.now() - startMs) / 1000);
  if (elapsedSecs < 0) return null;

  // Build cumulative seconds for each period based on schedule durations
  let cursor = 0;
  for (let i = 0; i < SCHEDULE.length; i++) {
    const row = SCHEDULE[i];
    const dur = Math.max(0, (timeStrToMins(row.end) - timeStrToMins(row.start)) * 60);
    if (dur <= 0) continue; // skip invalid periods
    if (elapsedSecs < cursor + dur) {
      return {
        periodIdx: i,
        secsLeft: cursor + dur - elapsedSecs,
        secsDone: elapsedSecs - cursor,
        totalSecs: dur
      };
    }
    cursor += dur;
  }
  return { periodIdx: -1, secsLeft: 0, secsDone: 0, totalSecs: 0 }; // practice over
}

function fmtTime(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = String(Math.abs(secs) % 60).padStart(2,'0');
  return m + ':' + s;
}

let practiceStartTime = null; // ms epoch when practice started (adjusted for pauses)
let practicePausedAt  = null; // ms epoch when practice was paused, null if running

function startPractice() {
  practiceStartTime = Date.now();
  practicePausedAt  = null;
  lastNotifPeriodIdx = -1;
  warned15 = false;
  if (db) {
    set(ref(db, 'playscript/practiceStart'), practiceStartTime);
    remove(ref(db, 'playscript/practicePaused'));
  }
  renderAndTickSideline();
  renderSidelineControls();
}

function pausePractice() {
  if (!practiceStartTime || practicePausedAt) return;
  practicePausedAt = Date.now();
  if (db) set(ref(db, 'playscript/practicePaused'), practicePausedAt);
  renderSidelineControls();
}

function resumePractice() {
  if (!practicePausedAt) return;
  // Shift start time forward by how long we were paused
  const pauseDuration = Date.now() - practicePausedAt;
  practiceStartTime += pauseDuration;
  practicePausedAt = null;
  if (db) {
    set(ref(db, 'playscript/practiceStart'), practiceStartTime);
    remove(ref(db, 'playscript/practicePaused'));
  }
  renderAndTickSideline();
  renderSidelineControls();
}

function resetPractice() {
  practiceStartTime = null;
  practicePausedAt  = null;
  lastNotifPeriodIdx = -1;
  warned15 = false;
  dismissNotif();
  if (db) {
    remove(ref(db, 'playscript/practiceStart'));
    remove(ref(db, 'playscript/practicePaused'));
  }
  if (sidelineInterval) { clearInterval(sidelineInterval); sidelineInterval = null; }
  renderSideline(document.getElementById('mainContent'));
}

function renderSidelineControls() {
  const el = document.getElementById('sidelineControls');
  if (!el) return;
  const isHC = currentRole === 'HC';
  if (!isHC) { el.innerHTML = ''; return; }
  const notStarted = !practiceStartTime;
  const isPaused   = !!practicePausedAt;
  const isRunning  = practiceStartTime && !practicePausedAt;

  el.innerHTML = notStarted
    ? '<button onclick="window.startPractice()" style="padding:8px 18px;background:#2e8b2e;color:#fff;border:none;font-family:var(--font-display);font-size:15px;letter-spacing:.08em;cursor:pointer;border-radius:2px">▶ START PRACTICE</button>'
    : (isRunning
      ? '<button onclick="window.pausePractice()" style="padding:8px 18px;background:var(--orange);color:#fff;border:none;font-family:var(--font-display);font-size:15px;letter-spacing:.08em;cursor:pointer;border-radius:2px;margin-right:8px">⏸ PAUSE</button>'
        + '<button onclick="window.resetPractice()" style="padding:8px 14px;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);font-family:var(--font-display);font-size:13px;letter-spacing:.06em;cursor:pointer">RESET</button>'
      : '<button onclick="window.resumePractice()" style="padding:8px 18px;background:#2e8b2e;color:#fff;border:none;font-family:var(--font-display);font-size:15px;letter-spacing:.08em;cursor:pointer;border-radius:2px;margin-right:8px">▶ RESUME</button>'
        + '<button onclick="window.resetPractice()" style="padding:8px 14px;background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);font-family:var(--font-display);font-size:13px;letter-spacing:.06em;cursor:pointer">RESET</button>'
      );
}

// ── NOTIFICATION SYSTEM ────────────────────────────────────────────────────
let lastNotifPeriodIdx = -1;
let warned15 = false;
let notifDismissTimer = null;
let pushGranted = false;

function requestPushPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { pushGranted = true; return; }
  if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => { pushGranted = p === 'granted'; });
  }
}

function showBanner(type, icon, title, sub, autoDismissSecs) {
  const banner = document.getElementById('notifBanner');
  const iconEl = document.getElementById('notifIcon');
  const titleEl = document.getElementById('notifTitle');
  const subEl   = document.getElementById('notifSub');
  if (!banner) return;

  // Clear any pending auto-dismiss
  if (notifDismissTimer) clearTimeout(notifDismissTimer);

  // Remove old type classes
  banner.classList.remove('warning', 'new-period', 'done');
  banner.classList.add(type);

  iconEl.textContent  = icon;
  titleEl.textContent = title;
  subEl.textContent   = sub;

  banner.classList.add('visible');

  if (autoDismissSecs) {
    notifDismissTimer = setTimeout(() => dismissNotif(), autoDismissSecs * 1000);
  }

  // Also send browser push notification if permission granted
  if (pushGranted && Notification.permission === 'granted') {
    try {
      new Notification(title, { body: sub, icon: '', silent: false });
    } catch(e) {}
  }
}

function dismissNotif() {
  const banner = document.getElementById('notifBanner');
  if (banner) banner.classList.remove('visible');
  if (notifDismissTimer) clearTimeout(notifDismissTimer);
}

// Called from tickSideline — checks whether we need to fire a notification
function checkNotifications(displayStatus) {
  if (!displayStatus || displayStatus.periodIdx === -1) return;
  if (practicePausedAt) return; // no notifications while paused

  const idx = displayStatus.periodIdx;
  const secsLeft = displayStatus.secsLeft;
  const row = SCHEDULE[idx];
  const pos = currentRole === 'HC' ? 'QB' : currentRole;
  const drill = (scriptData[currentDay] && scriptData[currentDay][idx] && scriptData[currentDay][idx][pos]) || 'Full team';

  // New period started
  if (idx !== lastNotifPeriodIdx) {
    lastNotifPeriodIdx = idx;
    warned15 = false;
    const nextRow = SCHEDULE[idx + 1];
    showBanner(
      'new-period',
      '▶',
      row.period.toUpperCase(),
      drill + (nextRow ? ' · Up next: ' + nextRow.period : ''),
      6
    );
  }

  // 15-second warning
  if (!warned15 && secsLeft <= 15 && secsLeft > 0) {
    warned15 = true;
    const nextRow = SCHEDULE[idx + 1];
    showBanner(
      'warning',
      '⚠',
      '15 SECONDS — ' + row.period.toUpperCase() + ' ENDING',
      nextRow ? 'Up next: ' + nextRow.period : 'Practice complete after this period',
      12
    );
  }

  // Practice complete
  if (idx === -1 && lastNotifPeriodIdx !== -999) {
    lastNotifPeriodIdx = -999;
    showBanner('done', '✓', 'PRACTICE COMPLETE', 'Great work today!', 10);
  }
}

window.dismissNotif = dismissNotif;

function renderAndTickSideline() {
  if (sidelineInterval) clearInterval(sidelineInterval);
  sidelineInterval = setInterval(() => {
    // Always check for notifications even if not on sideline view
    if (practiceStartTime && !practicePausedAt) {
      const st = calcCurrentPeriod(practiceStartTime);
      if (st) checkNotifications(st);
    }
    if (currentView !== 'sideline') return;
    tickSideline();
  }, 1000);
  tickSideline(); // immediate first tick
}

function tickSideline() {
  const status = practiceStartTime ? calcCurrentPeriod(practiceStartTime) : null;
  const timerEl = document.getElementById('sidelineTimer');
  const periodEl = document.getElementById('sidelinePeriodName');
  const drillEl  = document.getElementById('sidelineDrill');
  const nextEl   = document.getElementById('sidelineNext');
  const barEl    = document.getElementById('sidelineBar');

  if (!timerEl) return;

  if (!status || !practiceStartTime) {
    timerEl.textContent = '--:--';
    return;
  }

  // When paused, recalculate using the paused moment so display freezes
  const displayStatus = practicePausedAt
    ? calcCurrentPeriod(practiceStartTime + (Date.now() - practicePausedAt))
    : status;

  if (displayStatus.periodIdx === -1) {
    timerEl.textContent = 'DONE';
    if (periodEl) periodEl.textContent = 'PRACTICE COMPLETE';
    return;
  }

  const row = SCHEDULE[displayStatus.periodIdx];
  const pos = currentRole === 'HC' ? 'QB' : currentRole;
  const drill = (scriptData[currentDay] && scriptData[currentDay][displayStatus.periodIdx] && scriptData[currentDay][displayStatus.periodIdx][pos]) || 'Full team';

  timerEl.textContent = fmtTime(displayStatus.secsLeft);
  if (periodEl) periodEl.textContent = row.period.toUpperCase();
  if (drillEl)  drillEl.textContent  = drill;

  // Check if we need to fire a notification
  checkNotifications(displayStatus);

  // Progress bar
  const pct = Math.round((displayStatus.secsDone / displayStatus.totalSecs) * 100);
  if (barEl) barEl.style.width = pct + '%';

  // Next period
  if (nextEl) {
    const nextRow = SCHEDULE[displayStatus.periodIdx + 1];
    if (nextRow) {
      const nextDrill = (scriptData[currentDay] && scriptData[currentDay][displayStatus.periodIdx + 1] && scriptData[currentDay][displayStatus.periodIdx + 1][pos]) || 'Full team';
      nextEl.innerHTML =
        '<span style="font-family:var(--font-mono);font-size:11px;color:var(--ink3);min-width:36px">' + nextRow.start + '</span>' +
        '<span style="flex:1;font-size:12px;color:var(--ink2)">' + nextRow.period + ' — ' + nextDrill + '</span>' +
        '<span>' + pill(nextRow.type) + '</span>';
    } else {
      nextEl.innerHTML = '<span style="font-size:12px;color:var(--ink3)">Practice complete after this period</span>';
    }
  }
}

function renderSideline(el) {
  const pos = currentRole === 'HC' ? 'QB' : currentRole;
  const isHC = currentRole === 'HC';
  const myPlayers = PLAYERS.filter(p => p.pos === pos && p.weak && p.weak.length > 0).slice(0, 3);
  const notes = myPlayers.map(p =>
    '<div class="player-note"><b>' + p.name + ':</b> watch ' + p.weak[0] + '</div>'
  ).join('');

  const notStarted = !practiceStartTime;
  const status = practiceStartTime ? calcCurrentPeriod(practiceStartTime) : null;
  const row = (status && status.periodIdx >= 0) ? SCHEDULE[status.periodIdx] : SCHEDULE[0];

  el.innerHTML =
    '<div class="content-header">' +
      '<span class="content-title">SIDELINE</span>' +
      '<span class="content-meta">' + pos + ' COACH</span>' +
      '<div style="flex:1"></div>' +
      (isHC ? '<div id="sidelineControls"></div>' : '') +
    '</div>' +
    '<div class="mobile-view">' +

    // Main current period card
    '<div class="period-now">' +
      '<div class="period-now-hd">' +
        '<span class="period-now-label" id="sidelinePeriodName">' + (notStarted ? 'WAITING FOR HEAD COACH' : (row ? row.period.toUpperCase() : '')) + '</span>' +
        '<span class="period-timer" id="sidelineTimer">' + (notStarted ? '--:--' : '') + '</span>' +
      '</div>' +
      // Progress bar
      '<div style="height:4px;background:rgba(255,255,255,0.15);position:relative">' +
        '<div id="sidelineBar" style="height:4px;background:var(--orange);width:0%;transition:width .8s linear"></div>' +
      '</div>' +
      '<div class="period-now-body">' +
        '<div class="period-drill-name" id="sidelineDrill">' + (notStarted ? 'Tap Start Practice to begin' : '') + '</div>' +
        (notes ? '<div style="font-size:13px;color:#000;font-family:var(--font-mono);font-weight:600;margin:8px 0 5px">WATCH THESE PLAYERS</div><div class="period-player-notes">' + notes + '</div>' : '') +
      '</div>' +
    '</div>' +

    // Next period
    '<div class="period-next" id="sidelineNext">' +
      '<span style="font-size:12px;color:var(--ink3)">' + (notStarted ? 'Schedule will appear when practice starts' : '') + '</span>' +
    '</div>' +

    '<div style="text-align:center;padding:8px 0;font-size:13px;color:#000;font-family:var(--font-mono)">Clock updates in real time · synced across all coaches</div>' +
    '</div>';

  if (practiceStartTime) renderAndTickSideline();
  renderSidelineControls();
}

// Listen for practice start from Firebase (so all coaches sync automatically)
function initSidelineSync() {
  if (!db) return;
  onValue(ref(db, 'playscript/practiceStart'), snap => {
    const val = snap.val();
    if (val && val !== practiceStartTime) {
      practiceStartTime = val;
      if (currentView === 'sideline') {
        renderSideline(document.getElementById('mainContent'));
      } else {
        renderAndTickSideline();
      }
    } else if (!val) {
      practiceStartTime = null;
      if (sidelineInterval) { clearInterval(sidelineInterval); sidelineInterval = null; }
    }
    if (currentView === 'sideline') renderSidelineControls();
  });
  onValue(ref(db, 'playscript/practicePaused'), snap => {
    const val = snap.val();
    practicePausedAt = val || null;
    if (currentView === 'sideline') renderSidelineControls();
  });
}

// ── ROSTER EDITOR ─────────────────────────────────────────────────────────
let rosterSearch = '';
let rosterPosFilter = 'All';
let editingPlayerId = null; // null = new player, string = editing existing

// Load roster from Firebase on login, fall back to generated PLAYERS
function initRoster() {
  if (!db) return;
  onValue(ref(db, 'playscript/roster'), snap => {
    const data = snap.val();
    if (data) {
      // Replace PLAYERS array with Firebase data
      PLAYERS.length = 0;
      Object.values(data).forEach(p => PLAYERS.push(p));
    } else {
      // Seed Firebase with the generated sample players
      const obj = {};
      PLAYERS.forEach(p => { obj[p.id] = p; });
      set(ref(db, 'playscript/roster'), obj);
    }
    if (currentView === 'players' || currentView === 'roster') render();
  });
}

function savePlayer(player) {
  if (db) set(ref(db, 'playscript/roster/' + player.id), player);
  const idx = PLAYERS.findIndex(p => p.id === player.id);
  if (idx >= 0) PLAYERS[idx] = player;
  else PLAYERS.push(player);
}

function deletePlayer(id) {
  if (db) remove(ref(db, 'playscript/roster/' + id));
  const idx = PLAYERS.findIndex(p => p.id === id);
  if (idx >= 0) PLAYERS.splice(idx, 1);
  render();
}

function openPlayerModal(playerId) {
  editingPlayerId = playerId || null;
  const existing = playerId ? PLAYERS.find(p => p.id === playerId) : null;

  const allPositions = POS_LIST;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'playerModal';

  const primaryPos   = existing ? (existing.primaryPos || existing.pos || '') : '';
  const secondaryPos = existing ? (existing.secondaryPos || []) : [];
  const weakSkills   = existing ? ([...(existing.weak || [])]) : [];

  function posButtons(type) {
    return allPositions.map(p => {
      const isPrimary = type === 'primary' && primaryPos === p;
      const isSec     = type === 'secondary' && secondaryPos.includes(p);
      const cls = isPrimary ? ' selected-primary' : isSec ? ' selected-secondary' : '';
      return '<button class="pos-btn' + cls + '" onclick="window.togglePos(\'' + p + '\',\'' + type + '\')">' + p + '</button>';
    }).join('');
  }

  modal.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-header">' +
        '<span class="modal-title">' + (existing ? 'EDIT PLAYER' : 'ADD PLAYER') + '</span>' +
        '<button class="modal-close" onclick="window.closePlayerModal()">&#x2715;</button>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="modal-section">' +
          '<div class="field-row">' +
            '<div>' +
              '<label class="field-label">Player name</label>' +
              '<input class="field-input" id="pName" placeholder="First Last" value="' + (existing ? existing.name : '') + '">' +
            '</div>' +
            '<div>' +
              '<label class="field-label">Jersey #</label>' +
              '<input class="field-input" id="pNum" type="number" placeholder="00" value="' + (existing ? existing.num : '') + '">' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="modal-section">' +
          '<label class="field-label">Primary position <span class="field-hint">click one to select</span></label>' +
          '<div class="pos-selector" id="posPrimary">' + posButtons('primary') + '</div>' +
        '</div>' +
        '<div class="modal-section">' +
          '<label class="field-label">Secondary positions <span class="field-hint">optional — click any that apply</span></label>' +
          '<div class="pos-selector" id="posSecondary">' + posButtons('secondary') + '</div>' +
        '</div>' +
        '<div class="modal-section" id="skillsSection">' +
          '<label class="field-label">Weak areas <span class="field-hint">tap to flag — shows red on coach cards</span></label>' +
          '<div class="skills-grid" id="skillsGrid">' + renderSkillBtns(primaryPos, secondaryPos, weakSkills) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-footer">' +
        '<button class="cancel-btn" onclick="window.closePlayerModal()">CANCEL</button>' +
        '<button class="save-btn" onclick="window.savePlayerFromModal()">SAVE PLAYER</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(modal);
  modal._primaryPos   = primaryPos;
  modal._secondaryPos = [...secondaryPos];
  modal._weakSkills   = [...weakSkills];
}

function renderSkillBtns(primary, secondary, weak) {
  const positions = [primary, ...secondary].filter(Boolean);
  const skills = getSkillsForPos(positions);
  if (!skills.length) return '<span style="font-size:11px;color:var(--ink4);font-family:var(--font-body)">Select a position first</span>';
  return skills.map(s => `<button class="skill-btn${weak.includes(s)?' weak':''}" onclick="window.toggleSkill('${s}')">${s}</button>`).join('');
}

function getSkillsForPos(positions) {
  const all = new Set();
  positions.forEach(pos => (POS_SKILLS[pos]||[]).forEach(s => all.add(s)));
  return [...all].sort();
}

window.togglePos = function(pos, type) {
  const modal = document.getElementById('playerModal');
  if (!modal) return;
  if (type === 'primary') {
    modal._primaryPos = modal._primaryPos === pos ? '' : pos;
    // Remove from secondary if set as primary
    modal._secondaryPos = modal._secondaryPos.filter(p => p !== pos);
  } else {
    // Secondary: toggle, don't allow if already primary
    if (modal._primaryPos === pos) return;
    const idx = modal._secondaryPos.indexOf(pos);
    if (idx >= 0) modal._secondaryPos.splice(idx, 1);
    else modal._secondaryPos.push(pos);
  }
  // Re-render position buttons — no inline colors, CSS classes only
  const all = POS_LIST;
  document.getElementById('posPrimary').innerHTML = all.map(p => {
    const cls = modal._primaryPos === p ? ' selected-primary' : '';
    return '<button class="pos-btn' + cls + '" onclick="window.togglePos(\'' + p + '\',\'primary\')">' + p + '</button>';
  }).join('');
  document.getElementById('posSecondary').innerHTML = all.map(p => {
    const cls = modal._secondaryPos.includes(p) ? ' selected-secondary' : '';
    return '<button class="pos-btn' + cls + '" onclick="window.togglePos(\'' + p + '\',\'secondary\')">' + p + '</button>';
  }).join('');
  // Re-render skills for new position combo
  document.getElementById('skillsGrid').innerHTML = renderSkillBtns(modal._primaryPos, modal._secondaryPos, modal._weakSkills);
};

window.toggleSkill = function(skill) {
  const modal = document.getElementById('playerModal');
  if (!modal) return;
  const idx = modal._weakSkills.indexOf(skill);
  if (idx >= 0) modal._weakSkills.splice(idx, 1);
  else modal._weakSkills.push(skill);
  document.getElementById('skillsGrid').innerHTML = renderSkillBtns(modal._primaryPos, modal._secondaryPos, modal._weakSkills);
};

window.closePlayerModal = function() {
  const modal = document.getElementById('playerModal');
  if (modal) modal.remove();
  editingPlayerId = null;
};

window.savePlayerFromModal = function() {
  const modal = document.getElementById('playerModal');
  const name = document.getElementById('pName').value.trim();
  const num  = parseInt(document.getElementById('pNum').value) || 0;
  const pos  = modal._primaryPos;

  if (!name) { alert('Please enter a player name.'); return; }
  if (!pos)  { alert('Please select a primary position.'); return; }

  const id = editingPlayerId || ('p_' + Date.now());
  const player = {
    id, name, num, pos,
    primaryPos: pos,
    secondaryPos: modal._secondaryPos,
    weak: modal._weakSkills,
    good: getSkillsForPos([pos, ...modal._secondaryPos]).filter(s => !modal._weakSkills.includes(s))
  };

  savePlayer(player);
  window.closePlayerModal();
  render();
};

function editPlayer(id) { openPlayerModal(id); }
function confirmDeletePlayer(id) {
  if (confirm('Remove this player from the roster?')) {
    deletePlayer(id);
    render();
  }
}

function buildRosterRows(isHC) {
  const shown = PLAYERS
    .filter(p => {
      const matchPos = rosterPosFilter === 'All' || p.pos === rosterPosFilter || (p.secondaryPos||[]).includes(rosterPosFilter);
      const matchSearch = !rosterSearch || p.name.toLowerCase().includes(rosterSearch.toLowerCase()) || String(p.num).includes(rosterSearch);
      return matchPos && matchSearch;
    })
    .sort((a,b) => (a.num||0) - (b.num||0));

  if (!shown.length) return '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--ink4);font-size:12px">No players match</td></tr>';

  return shown.map(p => {
    const allPos = [p.primaryPos||p.pos, ...(p.secondaryPos||[])].filter(Boolean);
    const posTags = allPos.map((pos,i) =>
      '<span style="display:inline-block;padding:1px 7px;margin:1px;font-family:var(--font-display);font-size:10px;letter-spacing:.04em;' +
      (i===0 ? 'background:var(--royal-dark);color:#fff;' : 'background:var(--surface2);color:var(--ink2);border:1px solid var(--rule2);') +
      '">' + pos + '</span>'
    ).join('');
    const weakTags = (p.weak||[]).slice(0,5).map(w =>
      '<span style="display:inline-block;font-size:9px;padding:1px 6px;margin:1px;background:rgba(168,48,32,0.08);color:#a83020;border:1px solid rgba(168,48,32,0.25);font-family:var(--font-mono)">' + w + '</span>'
    ).join('') + ((p.weak||[]).length > 5 ? '<span style="font-size:9px;color:var(--ink4)"> +' + (p.weak.length-5) + '</span>' : '');
    const editBtn = '<button class="roster-action-btn" onclick="window.editPlayer(\'' + p.id + '\')">EDIT</button>';
    const removeBtn = isHC ? '<button class="roster-action-btn delete" onclick="window.confirmDeletePlayer(\'' + p.id + '\')">REMOVE</button>' : '';
    return '<tr>' +
      '<td style="font-family:var(--font-mono);font-size:11px;color:#000;white-space:nowrap;text-align:center">' + (p.num||'—') + '</td>' +
      '<td style="font-weight:500;font-size:12px;white-space:nowrap">' + p.name + '</td>' +
      '<td style="white-space:nowrap;text-align:center">' + posTags + '</td>' +
      '<td>' + (weakTags || '<span style="font-size:10px;color:var(--ink4)">—</span>') + '</td>' +
      '<td style="white-space:nowrap">' + editBtn + removeBtn + '</td>' +
      '</tr>';
  }).join('');
}

// ── SCHEDULE EDITOR ────────────────────────────────────────────────────────
const TYPE_LABELS = {indy:'INDY',combo:'COMBO',team:'TEAM',tempo:'WARMUP'};
const TYPE_OPTS = ['tempo','indy','combo','team'];

function calcDuration(start, end) {
  function toMins(t) {
    const [h,m] = t.split(':').map(Number);
    return h*60 + m;
  }
  const diff = toMins(end) - toMins(start);
  return diff > 0 ? diff + ' min' : '—';
}

function scheduleChanged() {
  // Push updated schedule to Firebase
  if (db) fbSet('schedule', SCHEDULE);
  // Show save confirmation briefly
  const bar = document.getElementById('schedSaveBar');
  if (bar) { bar.style.background='rgba(26,79,196,0.08)'; setTimeout(()=>bar.style.background='',1000); }
}

function addPeriod() {
  const last = SCHEDULE[SCHEDULE.length-1];
  SCHEDULE.push({start:last?last.end:'5:00', end:'5:10', period:'New period', type:'tempo'});
  renderScheduleEditor(document.getElementById('mainContent'));
}

function removePeriod(idx) {
  if (SCHEDULE.length <= 1) return;
  SCHEDULE.splice(idx, 1);
  scheduleChanged();
  renderScheduleEditor(document.getElementById('mainContent'));
}

function movePeriod(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= SCHEDULE.length) return;
  [SCHEDULE[idx], SCHEDULE[newIdx]] = [SCHEDULE[newIdx], SCHEDULE[idx]];
  scheduleChanged();
  renderScheduleEditor(document.getElementById('mainContent'));
}

function updatePeriodField(idx, field, val) {
  SCHEDULE[idx][field] = val;
  scheduleChanged();
  // Refresh just the duration cell
  const durEl = document.getElementById('dur-' + idx);
  if (durEl) durEl.textContent = calcDuration(SCHEDULE[idx].start, SCHEDULE[idx].end);
}

function saveSchedule() {
  scheduleChanged();
  // Re-render script view so it picks up new times
  if (currentView === 'script') render();
  const bar = document.getElementById('schedSaveBar');
  if (bar) {
    const note = bar.querySelector('.sched-note');
    if (note) { note.textContent = 'Saved! Script view updated.'; setTimeout(()=>note.textContent='Changes are applied to the practice script in real time.',2000); }
  }
}

function renderScheduleEditor(el) {
  const rows = SCHEDULE.map((row, i) => {
    const typeOpts = TYPE_OPTS.map(t =>
      '<option value="' + t + '"' + (row.type===t?' selected':'') + '>' + (TYPE_LABELS[t]||t) + '</option>'
    ).join('');
    const pillStyle = {
      indy:  'background:#dce6ff;color:#1a3fa8;',
      combo: 'background:#ffe8d6;color:#bf4800;',
      team:  'background:#cdd8f8;color:#0d2e80;',
      tempo: 'background:#e8edf5;color:#556080;',
    }[row.type] || '';

    return '<tr>' +
      '<td style="width:28px;text-align:center">' +
        '<div style="display:flex;flex-direction:column;gap:1px">' +
          '<button class="sched-move-btn" onclick="window.movePeriod(' + i + ',-1)" ' + (i===0?'disabled style="opacity:.3"':'') + '>▲</button>' +
          '<button class="sched-move-btn" onclick="window.movePeriod(' + i + ',1)" ' + (i===SCHEDULE.length-1?'disabled style="opacity:.3"':'') + '>▼</button>' +
        '</div>' +
      '</td>' +
      '<td style="width:80px"><input class="sched-input" value="' + row.start + '" placeholder="3:30" onchange="window.updatePeriodField(' + i + ',\'start\',this.value)" onblur="window.updatePeriodField(' + i + ',\'start\',this.value)"></td>' +
      '<td style="width:80px"><input class="sched-input" value="' + row.end + '" placeholder="3:40" onchange="window.updatePeriodField(' + i + ',\'end\',this.value)" onblur="window.updatePeriodField(' + i + ',\'end\',this.value)"></td>' +
      '<td style="width:60px;text-align:center"><span id="dur-' + i + '" class="dur-badge">' + calcDuration(row.start, row.end) + '</span></td>' +
      '<td><input class="sched-input name-input" value="' + row.period + '" onchange="window.updatePeriodField(' + i + ',\'period\',this.value)" onblur="window.updatePeriodField(' + i + ',\'period\',this.value)"></td>' +
      '<td style="width:110px"><select class="type-select" onchange="window.updatePeriodField(' + i + ',\'type\',this.value)">' + typeOpts + '</select></td>' +
      '<td style="width:50px;text-align:center"><button class="sched-del-btn" onclick="window.removePeriod(' + i + ')"' + (SCHEDULE.length<=1?' disabled':'') + '>✕</button></td>' +
    '</tr>';
  }).join('');

  const totalStart = SCHEDULE[0]?.start || '—';
  const totalEnd   = SCHEDULE[SCHEDULE.length-1]?.end || '—';

  el.innerHTML =
    '<div class="content-header">' +
      '<span class="content-title">EDIT SCHEDULE</span>' +
      '<span class="content-meta">' + SCHEDULE.length + ' PERIODS · ' + totalStart + '–' + totalEnd + '</span>' +
      '<div style="flex:1"></div>' +
      '<button class="sched-add-btn" onclick="window.addPeriod()">+ ADD PERIOD</button>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--ink3);font-family:var(--font-body);margin-bottom:8px">Edit start/end times and period names directly. Changes apply to the practice script immediately. Use ▲▼ to reorder periods.</div>' +
    '<div class="sched-table-wrap">' +
      '<table class="sched-table">' +
        '<thead><tr>' +
          '<th style="width:28px"></th>' +
          '<th>Start</th><th>End</th><th>Duration</th>' +
          '<th>Period name</th><th>Type</th><th style="width:50px"></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
    '<div class="sched-save-bar" id="schedSaveBar">' +
      '<button class="sched-save-btn" onclick="window.saveSchedule()">SAVE & APPLY</button>' +
      '<span class="sched-note">Changes are applied to the practice script in real time.</span>' +
    '</div>';
}

function openAddPlayer() { openPlayerModal(null); }
function setRosterSearch(val) {
  rosterSearch = val;
  // Only rebuild the table body — don't re-render the whole view (would lose focus)
  const tbody = document.getElementById('rosterTbody');
  if (tbody) {
    tbody.innerHTML = buildRosterRows(currentRole === 'HC');
  } else {
    // First load — full render
    render();
  }
}
function setRosterPosFilter(pos) { rosterPosFilter = pos; render(); }

// Initial render placeholder
document.getElementById('mainContent').innerHTML='';

// Expose functions needed by inline HTML onclick= attributes

function doPrint() {
  // Show a brief message then print
  window.print();
}
window.doPrint = doPrint;

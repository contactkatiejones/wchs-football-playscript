<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteland Warriors — Practice Script</title>
<style>
/* ═══════════════════════════════════════════════════════
   WHITELAND FOOTBALL — NFL-STYLE PRACTICE SCRIPT
   Inspired by actual NFL ops room aesthetics:
   • Light background / dark ink (like printed scripts)
   • Hard ruled lines, zero border-radius on data tables
   • Condensed athletic headers (Bebas Neue)
   • Dense information layout with strict typographic grid
   • Warriors brand: Royal blue #1a3fa8 + Orange #e85c00
   ═══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');

:root {
  /* Warriors brand */
  --royal:      #1a3fa8;
  --royal-dark: #122d80;
  --royal-mid:  #2555d4;
  --royal-lite: #5585f8;
  --orange:     #e85c00;
  --orange-mid: #ff7320;
  --orange-lite: #ffaa60;

  /* App chrome — light mode like real NFL scripts */
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --surface2: #f4f6fa;
  --surface3: #e8edf5;

  /* Ink */
  --ink:      #0d1117;
  --ink2:     #000;
  --ink3:     #000;
  --ink4:     #333;

  /* Borders — sharp, like printed ruled lines */
  --rule:     #d0d6e4;
  --rule2:    #b8c0d4;
  --rule3:    #9098b0;

  /* Position accent colors — NFL depth-chart feel */
  --qb:   #1a3fa8; --qb-bg:   #dce6ff;
  --rb:   #e85c00; --rb-bg:   #ffe8d6;
  --wr:   #2555d4; --wr-bg:   #dde8ff;
  --te:   #bf4800; --te-bg:   #ffd9c0;
  --ol:   #0d2e80; --ol-bg:   #cdd8f8;
  --dl:   #c74400; --dl-bg:   #ffd0b8;
  --lb:   #1e4ec8; --lb-bg:   #d8e4ff;
  --db:   #a83a00; --db-bg:   #ffe0c8;
  --kp:   #556080; --kp-bg:   #e4e8f4;
  --st:   #284ea0; --st-bg:   #d8e2f8;

  /* Period stripe colors */
  --indy:       #1a3fa8; --indy-bg:   #dce6ff; --indy-stripe: #1a3fa8;
  --combo:      #e85c00; --combo-bg:  #ffe8d6; --combo-stripe: #e85c00;
  --team:       #0d2e80; --team-bg:   #cdd8f8; --team-stripe:  #0d2e80;
  --tempo:      #556080; --tempo-bg:  #e8edf5; --tempo-stripe: #7a8399;

  /* Accent */
  --accent:     #1a3fa8;
  --accent-dim: rgba(26,63,168,0.08);
  --accent-hover: #122d80;

  /* Status */
  --red:    #c0392b; --red-bg:   rgba(192,57,43,0.1);
  --green:  #1a7a40; --green-bg: rgba(26,122,64,0.1);

  --font-display: 'Bebas Neue', sans-serif;
  --font-head:    'Inter', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-mono:    'Roboto Mono', monospace;

  --radius: 2px;
  --radius-lg: 4px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--rule2); border-radius: 2px; }

/* ══════════════════════════════════════════════════════
   LOGIN SCREEN
   ══════════════════════════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
  padding: 2rem;
  background: var(--royal-dark);
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.03) 39px,
      rgba(255,255,255,0.03) 40px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.03) 39px,
      rgba(255,255,255,0.03) 40px
    );
}

/* Orange top stripe on login */
#login-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--orange) 0%, var(--orange-mid) 100%);
}

.login-logo {
  font-family: var(--font-display);
  font-size: 52px;
  letter-spacing: 5px;
  color: #ffffff;
  text-align: center;
  line-height: 1;
}
.login-logo span { color: var(--orange-mid); }
.login-sub {
  font-family: var(--font-head);
  font-size: 14px;
  letter-spacing: .04em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}
.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-width: 600px;
  width: 100%;
}
@media(max-width:480px){ .role-grid { grid-template-columns: repeat(2,1fr); } }
.role-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 0;
  border-top: 3px solid transparent;
  padding: 20px 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  color: #fff;
}
.role-card:hover {
  background: rgba(255,255,255,0.1);
  border-top-color: var(--orange-mid);
}
.role-card.selected {
  background: rgba(232,92,0,0.15);
  border-color: rgba(255,255,255,0.2);
  border-top-color: var(--orange);
}
.role-card-hc {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-top: 4px solid var(--orange);
  padding: 22px 20px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  color: #fff;
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.role-card-hc:hover { background: rgba(255,255,255,0.12); }
.role-card-hc.selected { background: rgba(232,92,0,0.2); border-color: var(--orange); }
.role-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0 auto 10px; }
.role-dot-hc { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.role-name {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: .05em;
  color: #fff;
}
.role-name-hc {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: .06em;
  color: #fff;
}
.role-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; font-family: var(--font-head); letter-spacing: .06em; }
.login-btn {
  padding: 13px 48px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: .15em;
  cursor: pointer;
  opacity: 0.35;
  transition: all .15s;
  text-transform: uppercase;
}
.login-btn.active { opacity: 1; }
.login-btn.active:hover { background: var(--orange-mid); }

/* ══════════════════════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════════════════════ */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.topbar {
  height: 48px;
  background: var(--royal-dark);
  border-bottom: 3px solid var(--orange);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 14px;
  flex-shrink: 0;
}
.topbar-logo {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 2px;
  line-height: 1;
  color: #ffffff;
}
.topbar-logo span { color: #fff; }
.topbar-day {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--orange);
  background: transparent;
  padding: 3px 10px;
  border: 1px solid var(--orange);
  letter-spacing: .1em;
}
.topbar-spacer { flex: 1; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #6ee8a0;
  letter-spacing: .08em;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #6ee8a0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.presence-avatars { display: flex; }
.presence-av {
  width: 28px; height: 28px;
  border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 11px;
  border: 1px solid rgba(255,255,255,0.2);
  margin-left: -1px;
  cursor: default;
  position: relative;
}
.presence-av:first-child { margin-left: 0; }
.presence-av[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: -26px; left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 9px; font-family: var(--font-body);
  background: var(--ink); color: #fff;
  padding: 3px 7px;
  pointer-events: none;
  z-index: 10;
}
.role-badge {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .1em;
  padding: 4px 10px;
  border: 1px solid #fff;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

/* Firebase badge */
#fbStatus {
  font-size: 9px !important;
  font-family: var(--font-mono) !important;
  padding: 3px 8px !important;
  background: rgba(110,232,160,0.12) !important;
  color: #6ee8a0 !important;
  border: 1px solid rgba(110,232,160,0.25) !important;
  letter-spacing: .06em;
}

/* ══════════════════════════════════════════════════════
   MAIN LAYOUT
   ══════════════════════════════════════════════════════ */
.main { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 176px;
  background: var(--royal-dark);
  border-right: 3px solid var(--orange);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-section {
  padding: 10px 12px 3px;
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .08em;
  color: rgba(255,255,255,0.45);
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 2px;
  text-transform: uppercase;
}
.sidebar-section:first-child { margin-top: 0; border-top: none; }
.sidebar-item {
  padding: 6px 12px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,0.65);
  border-left: 3px solid transparent;
  transition: all .12s;
}
.sidebar-item:hover { color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.07); }
.sidebar-item.active {
  color: #fff;
  border-left-color: var(--orange);
  background: rgba(232,92,0,0.18);
}
.day-item {
  padding: 5px 12px 5px 16px;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  transition: all .12s;
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid transparent;
  letter-spacing: 0;
}
.day-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); }
.day-item.active { color: #fff; border-left-color: var(--orange-mid); background: rgba(255,255,255,0.05); }


/* ══════════════════════════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════════════════════════ */
.content {
  flex: 1; overflow: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--bg);
}

.content-header {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--royal);
}
.content-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--royal-dark);
}
.content-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #000;
  letter-spacing: .02em;
  background: var(--surface2);
  padding: 3px 8px;
  border: 1px solid var(--rule);
}

/* ══════════════════════════════════════════════════════
   STATS BAR — NFL-style scoreboard tiles
   ══════════════════════════════════════════════════════ */
.stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--rule2); border: 1px solid var(--rule2); }
@media(max-width:500px){ .stats-bar { grid-template-columns: repeat(2,1fr); } }
.stat-card {
  background: var(--surface);
  padding: 12px 14px;
  border-top: 3px solid var(--royal);
}
.stat-card:nth-child(even) { border-top-color: var(--orange); }
.stat-label {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--ink3);
  margin-bottom: 2px;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--ink);
  line-height: 1;
}
.stat-sub { font-size: 10px; color: var(--ink4); margin-top: 2px; font-family: var(--font-body); }

/* ══════════════════════════════════════════════════════
   SCRIPT TABLE — hard-ruled, NFL ops sheet style
   ══════════════════════════════════════════════════════ */
.script-wrap {
  overflow-x: auto;
  border: 1px solid var(--rule2);
  background: var(--surface);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.script-table { width: 100%; border-collapse: collapse; min-width: 900px; }
.script-table th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--royal-dark);
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .14em;
  color: rgba(255,255,255,0.7);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 2px solid var(--orange);
  border-right: 1px solid rgba(255,255,255,0.1);
  white-space: nowrap;
}
.script-table th:last-child { border-right: none; }
.script-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  vertical-align: middle;
  font-size: 12px;
  background: var(--surface);
}
.script-table td:last-child { border-right: none; }
.script-table tr:last-child td { border-bottom: none; }
.script-table tr:hover td { background: var(--surface2); }
/* Alternating row tint */
.script-table tr:nth-child(even) td { background: #fafbfd; }
.script-table tr:nth-child(even):hover td { background: var(--surface2); }

.time-cell {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink2);
  white-space: nowrap;
}

/* Period pills — hard rectangular, NFL-ops style */
.period-pill {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .08em;
  white-space: nowrap;
}
.pill-indy  { background: var(--indy-bg);  color: var(--indy);  border-left: 3px solid var(--indy);  }
.pill-combo { background: var(--combo-bg); color: var(--combo); border-left: 3px solid var(--combo); }
.pill-team  { background: var(--team-bg);  color: var(--team);  border-left: 3px solid var(--team);  }
.pill-tempo { background: var(--tempo-bg); color: var(--tempo-stripe); border-left: 3px solid var(--tempo-stripe); }

/* Drill input — looks like a form field on a printed sheet */
.drill-input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  padding: 3px 5px;
  font-size: 11px;
  color: var(--ink);
  font-family: var(--font-body);
  transition: all .1s;
  min-width: 90px;
}
.drill-input:hover { border-color: var(--rule2); background: #f0f4ff; }
.drill-input:focus { outline: none; border-color: var(--royal-mid); background: #e8f0ff; }
.drill-input:disabled { color: var(--ink3); cursor: default; }
.drill-input.peer-editing { border-color: var(--orange); background: rgba(232,92,0,0.04); }
.drill-input.my-group { color: var(--ink); font-weight: 500; }
.changed-cell { background: rgba(232,92,0,0.04) !important; }

.cell-multi { display: flex; align-items: center; gap: 5px; }
.comment-badge {
  flex-shrink: 0;
  background: var(--orange);
  color: #fff;
  font-size: 9px;
  padding: 1px 5px;
  font-family: var(--font-display);
  letter-spacing: .06em;
  cursor: pointer;
  white-space: nowrap;
}

/* Position header badges */
.pos-th { text-align: center !important; }
.pos-th-badge {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: .06em;
  border-bottom: 2px solid currentColor;
}

/* ══════════════════════════════════════════════════════
   ACTIVITY FEED
   ══════════════════════════════════════════════════════ */
.activity-feed {
  background: var(--surface);
  border: 1px solid var(--rule2);
  overflow: hidden;
}
.feed-header {
  padding: 8px 12px;
  border-bottom: 2px solid var(--royal);
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .1em;
  color: var(--royal-dark);
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
}
.feed-item {
  padding: 7px 12px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 11px;
  animation: slideIn .25s ease;
}
.feed-item:last-child { border-bottom: none; }
@keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.feed-av {
  width: 22px; height: 22px;
  border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  flex-shrink: 0;
  font-family: var(--font-display);
  letter-spacing: .04em;
}
.feed-text { flex: 1; color: var(--ink3); line-height: 1.4; }
.feed-text b { color: var(--ink); }
.feed-time { font-family: var(--font-mono); font-size: 9px; color: var(--ink4); flex-shrink: 0; }

/* ══════════════════════════════════════════════════════
   FILTER BAR & PLAYER GRID
   ══════════════════════════════════════════════════════ */
.filter-bar { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 4px 12px;
  border-radius: 0;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: .06em;
  border: 1px solid var(--rule2);
  background: var(--surface);
  color: var(--ink3);
  cursor: pointer;
  transition: all .1s;
  border-bottom: 2px solid transparent;
}
.filter-btn:hover { color: var(--ink); border-bottom-color: var(--royal-mid); }
.filter-btn.active {
  color: var(--royal-dark);
  background: var(--surface2);
  border-bottom-color: var(--orange);
  font-weight: 600;
}

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.player-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-top: 3px solid var(--rule2);
  padding: 11px 13px;
  transition: border-top-color .12s;
}
.player-card:hover { border-top-color: var(--royal-mid); }
.pc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.pc-num {
  font-family: var(--font-display);
  font-size: 14px;
  color: #000;
  min-width: 28px;
  letter-spacing: .04em;
}
.pc-name { font-size: 13px; font-weight: 600; flex: 1; color: var(--ink); font-family: var(--font-head); }
.pc-pos {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: .06em;
  padding: 1px 6px;
  border-radius: 0;
}
.pc-weak { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
.weak-tag {
  font-size: 9px; padding: 1px 5px;
  background: rgba(192,57,43,0.1);
  color: #c0392b;
  font-family: var(--font-mono);
  border-left: 2px solid #c0392b;
}
.no-weak { font-size: 10px; color: var(--ink4); font-family: var(--font-mono); }
.pc-drill {
  font-size: 10px; color: var(--ink2);
  padding: 3px 7px;
  background: var(--surface2);
  border-left: 3px solid var(--indy);
  margin-top: 3px;
  line-height: 1.4;
  font-family: var(--font-body);
}
.pc-drill.focus { border-left-color: var(--orange); color: var(--orange); }

/* ══════════════════════════════════════════════════════
   SIDELINE VIEW
   ══════════════════════════════════════════════════════ */
.mobile-view { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.period-now {
  background: var(--surface);
  border: 1px solid var(--rule2);
  border-top: 4px solid var(--royal);
  overflow: hidden;
}
.period-now-hd {
  background: var(--royal-dark);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.period-now-label {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .1em;
  color: #fff;
}
.period-timer {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--orange-mid);
}
.period-now-body { padding: 12px 14px; }
.period-drill-name {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 1px;
  color: var(--ink);
  margin-bottom: 4px;
}
.period-drill-desc { font-size: 14px; color: #000; line-height: 1.5; margin-bottom: 8px; }
.period-player-notes { display: flex; flex-direction: column; gap: 4px; }
.player-note {
  font-size: 11px; padding: 4px 8px;
  background: rgba(192,57,43,0.07);
  border-left: 3px solid #c0392b;
  color: var(--ink2);
}
.player-note b { color: var(--ink); }



/* ══════════════════════════════════════════════════════
   BUTTONS & MISC
   ══════════════════════════════════════════════════════ */
.view-tabs {
  display: flex; gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule2);
  padding: 1px;
}
.view-tab {
  padding: 5px 12px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: .08em;
  cursor: pointer;
  color: var(--ink3);
  transition: all .1s;
  border: none;
  background: var(--surface2);
}
.view-tab:hover { color: var(--ink); background: var(--surface); }
.view-tab.active { background: var(--royal-dark); color: #fff; }

.export-btn {
  padding: 7px 16px;
  background: #e8e8e8;
  border: 1px solid #ccc;
  color: #111;
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all .12s;
}
.export-btn:hover { background: #d4d4d4; }

/* Setup guide — orange accent on dark */
.setup-guide {
  background: var(--surface);
  border: 1px solid var(--rule2);
  border-top: 3px solid var(--orange);
  padding: 14px 16px;
}
.setup-guide-title {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .1em;
  color: var(--orange);
  margin-bottom: 10px;
}

/* ══════════════════════════════════════════════════════
   EDIT ROSTER
   ══════════════════════════════════════════════════════ */
.roster-toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.roster-add-btn {
  padding:8px 18px; background:var(--royal-dark); color:#fff; border:none;
  font-family:var(--font-display); font-size:14px; letter-spacing:.08em;
  cursor:pointer; transition:background .12s;
}
.roster-add-btn:hover { background:var(--royal-mid); }
.roster-search {
  flex:1; min-width:160px; max-width:260px; padding:7px 10px;
  border:1px solid var(--rule2); background:var(--surface);
  color:var(--ink); font-family:var(--font-body); font-size:13px;
}
.roster-search:focus { outline:none; border-color:var(--royal-mid); }
.roster-pos-filter { display:flex; gap:4px; flex-wrap:wrap; }
.roster-table-wrap { overflow-x:auto; border:1px solid var(--rule2); background:var(--surface); }
.roster-table { width:100%; border-collapse:collapse; min-width:600px; }
.roster-table th {
  position: sticky;
  top: 0;
  z-index: 2;
  background:var(--royal-dark); font-family:var(--font-display); font-size:11px;
  letter-spacing:.12em; color:rgba(255,255,255,0.75); padding:8px 10px; text-align:left;
  border-bottom:2px solid var(--orange); border-right:1px solid rgba(255,255,255,0.08); white-space:nowrap;
}
.roster-table th:last-child { border-right:none; }
.roster-table td {
  padding:7px 10px; border-bottom:1px solid var(--rule); border-right:1px solid var(--rule);
  font-size:12px; vertical-align:middle; background:var(--surface);
}
.roster-table td:last-child { border-right:none; }
.roster-table tr:last-child td { border-bottom:none; }
.roster-table tr:nth-child(even) td { background:#fafbfd; }
.roster-table tr:hover td { background:var(--surface2); }
.pos-tag {
  display:inline-block; padding:2px 7px; margin:1px;
  font-family:var(--font-display); font-size:10px; letter-spacing:.04em;
  background:var(--surface2); color:var(--ink2); border:1px solid var(--rule2);
}
.pos-tag-primary { background:var(--royal-dark); color:#fff; border-color:var(--royal-dark); }
.weak-tag-small {
  display:inline-block; font-size:9px; padding:2px 6px; margin:1px;
  background:rgba(168,48,32,0.08); color:#a83020;
  border:1px solid rgba(168,48,32,0.25); font-family:var(--font-mono);
}
.roster-action-btn {
  padding:3px 10px; font-family:var(--font-display); font-size:11px; letter-spacing:.06em;
  border:1px solid var(--rule2); background:transparent;
  color:var(--ink3); cursor:pointer; transition:all .1s; margin-right:4px;
}
.roster-action-btn:hover { background:var(--surface2); color:var(--ink); border-color:var(--rule3); }
.roster-action-btn.delete:hover { background:rgba(168,48,32,0.08); color:#a83020; border-color:rgba(168,48,32,0.4); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(10,13,20,0.75);
  display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem;
}
.modal-box {
  background:var(--surface); border:1px solid var(--rule2);
  border-top:3px solid var(--royal-dark); width:100%; max-width:580px; max-height:90vh; overflow-y:auto;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-bottom:1px solid var(--rule); background:var(--royal-dark);
}
.modal-title { font-family:var(--font-display); font-size:18px; letter-spacing:.1em; color:#fff; }
.modal-close { background:none; border:none; font-size:18px; color:rgba(255,255,255,0.5); cursor:pointer; padding:0 4px; line-height:1; }
.modal-close:hover { color:#fff; }
.modal-body { padding:20px; display:flex; flex-direction:column; gap:18px; }
.modal-footer {
  padding:14px 20px; border-top:1px solid var(--rule);
  display:flex; gap:8px; justify-content:flex-end; background:var(--surface2);
}
.modal-section { display:flex; flex-direction:column; gap:6px; }
.field-label {
  font-family:var(--font-display); font-size:10px; letter-spacing:.14em;
  color:var(--ink3); display:block; text-transform:uppercase;
}
.field-hint { font-size:10px; color:var(--ink4); font-family:var(--font-body); margin-left:8px; font-style:italic; text-transform:none; letter-spacing:0; }
.field-input {
  width:100%; padding:9px 11px; border:1px solid var(--rule2); background:var(--surface);
  color:var(--ink); font-family:var(--font-body); font-size:13px;
}
.field-input:focus { outline:none; border-color:var(--royal-mid); background:#f8faff; }
.field-row { display:grid; grid-template-columns:2fr 1fr; gap:12px; }
.pos-selector { display:flex; flex-wrap:wrap; gap:5px; }
.pos-btn {
  padding:6px 13px; font-family:var(--font-display); font-size:12px; letter-spacing:.06em;
  border:1px solid var(--rule2); background:var(--surface2);
  color:var(--ink2); cursor:pointer; transition:all .1s; min-width:44px; text-align:center;
}
.pos-btn:hover { border-color:var(--royal-mid); color:var(--royal-mid); background:var(--surface); }
.pos-btn.selected-primary { background:var(--royal-dark) !important; color:#fff !important; border-color:var(--royal-dark) !important; }
.pos-btn.selected-secondary { background:var(--surface) !important; color:var(--royal-mid) !important; border-color:var(--royal-mid) !important; border-width:2px !important; }
.skills-grid { display:flex; flex-wrap:wrap; gap:5px; }
.skill-btn {
  padding:5px 11px; font-size:11px; font-family:var(--font-body);
  border:1px solid var(--rule2); background:var(--surface2);
  color:var(--ink2); cursor:pointer; transition:all .1s;
}
.skill-btn:hover { border-color:var(--rule3); color:var(--ink); background:var(--surface); }
.skill-btn.weak { background:rgba(168,48,32,0.08); color:#a83020; border-color:rgba(168,48,32,0.35); font-weight:500; }
.save-btn {
  padding:9px 28px; background:var(--royal-dark); color:#fff; border:none;
  font-family:var(--font-display); font-size:14px; letter-spacing:.1em; cursor:pointer; transition:background .12s;
}
.save-btn:hover { background:var(--royal-mid); }
.cancel-btn {
  padding:9px 18px; background:transparent; color:var(--ink3); border:1px solid var(--rule2);
  font-family:var(--font-display); font-size:14px; letter-spacing:.06em; cursor:pointer; transition:all .12s;
}
.cancel-btn:hover { background:var(--surface2); color:var(--ink); }

/* ── SCHEDULE EDITOR ── */
.sched-table-wrap { border:1px solid var(--rule2); background:var(--surface); overflow:hidden; max-height:60vh; overflow-y:auto; }
.sched-table { width:100%; border-collapse:collapse; }
.sched-table th {
  background:var(--royal-dark); font-family:var(--font-display); font-size:10px;
  letter-spacing:.12em; color:rgba(255,255,255,0.75); padding:8px 12px; text-align:left;
  border-bottom:2px solid var(--orange); border-right:1px solid rgba(255,255,255,0.08);
  position:sticky; top:0; z-index:1;
}
.sched-table th:last-child { border-right:none; }
.sched-table td {
  padding:6px 10px; border-bottom:1px solid var(--rule); border-right:1px solid var(--rule);
  vertical-align:middle; background:var(--surface);
}
.sched-table td:last-child { border-right:none; }
.sched-table tr:last-child td { border-bottom:none; }
.sched-table tr:nth-child(even) td { background:#fafbfd; }
.sched-table tr:hover td { background:var(--surface2); }
.sched-input {
  width:100%; padding:5px 8px; border:1px solid transparent;
  background:transparent; color:var(--ink); font-family:var(--font-mono); font-size:12px;
  transition:all .1s;
}
.sched-input:hover { border-color:var(--rule2); background:var(--surface); }
.sched-input:focus { outline:none; border-color:var(--royal-mid); background:#f0f5ff; }
.sched-input.name-input { font-family:var(--font-body); font-size:12px; }
.type-select {
  padding:4px 8px; border:1px solid var(--rule2); background:var(--surface2);
  color:var(--ink); font-family:var(--font-display); font-size:11px; letter-spacing:.04em; cursor:pointer;
}
.type-select:focus { outline:none; border-color:var(--royal-mid); }
.dur-badge {
  display:inline-block; padding:2px 8px; font-family:var(--font-mono); font-size:11px;
  background:var(--surface2); color:var(--ink3); border:1px solid var(--rule);
}
.sched-add-btn {
  padding:8px 18px; background:var(--royal-dark); color:#fff; border:none;
  font-family:var(--font-display); font-size:13px; letter-spacing:.08em;
  cursor:pointer; transition:background .12s;
}
.sched-add-btn:hover { background:var(--royal-mid); }
.sched-del-btn {
  padding:3px 10px; font-family:var(--font-display); font-size:11px; letter-spacing:.06em;
  border:1px solid var(--rule2); background:transparent; color:var(--ink3); cursor:pointer; transition:all .1s;
}
.sched-del-btn:hover { background:rgba(168,48,32,0.08); color:#a83020; border-color:rgba(168,48,32,0.4); }
.sched-move-btn {
  padding:2px 8px; font-size:13px; border:1px solid var(--rule2); background:transparent;
  color:var(--ink3); cursor:pointer; margin:0 1px; transition:all .1s;
}
.sched-move-btn:hover { background:var(--surface2); color:var(--ink); }
.sched-save-bar {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--surface2); border:1px solid var(--rule2); border-top:none;
}
.sched-save-btn {
  padding:7px 20px; background:var(--orange); color:#fff; border:none;
  font-family:var(--font-display); font-size:13px; letter-spacing:.08em;
  cursor:pointer; transition:background .12s;
}
.sched-save-btn:hover { background:var(--orange-mid); }
.sched-note { font-size:11px; color:var(--ink3); font-family:var(--font-body); }

/* ══════════════════════════════════════════════════════
   MOBILE — full responsive overhaul
   Breakpoint: 700px and below
   ══════════════════════════════════════════════════════ */
@media (max-width: 700px) {

  /* ── TOPBAR ── */
  .topbar { padding: 0 10px; gap: 8px; height: 48px; }
  .menu-toggle { width: 52px; height: 52px; font-size: 30px; }
  .topbar-day { display: flex; align-items: center; font-size: 14px; padding: 4px 10px; letter-spacing: .1em; color: var(--orange); border-color: var(--orange); order: 1; }
  .role-badge { order: 2; font-size: 12px; padding: 4px 7px; min-width: 0; }
  .switch-role-btn { order: 3; }
  .live-badge { order: 4; display: none; }
  .presence-avatars { display: none; }
  #fbStatus { display: none !important; }
  .switch-role-btn { font-size: 12px !important; padding: 4px 7px !important; letter-spacing: .02em !important; }
  .topbar-logo { font-size: 17px; letter-spacing: 2px; }

  /* ── SIDEBAR — slide-over overlay on mobile ── */
  .main { position: relative; }
  .sidebar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 220px;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .22s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.35);
  }
  .sidebar.open { transform: translateX(0); }

  /* Overlay behind open sidebar */
  .sidebar-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99;
  }
  .sidebar-overlay.visible { display: block; }

  /* Menu toggle button in topbar */
  .menu-toggle {
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── CONTENT ── */
  .content { padding: 12px; gap: 12px; }
  .content-title { font-size: 20px; }
  .content-header { padding-bottom: 8px; flex-wrap: wrap; gap: 8px; }

  /* ── STATS BAR ── */
  .stats-bar { grid-template-columns: repeat(2,1fr); }
  .stat-val { font-size: 22px; }

  /* ── SCRIPT TABLE ── */
  .script-wrap { font-size: 11px; }
  .drill-input { min-width: 70px; font-size: 10px; }

  /* ── ROSTER TABLES ── */
  .roster-table-wrap { font-size: 11px; }
  .roster-toolbar { flex-direction: column; align-items: stretch; gap: 6px; }
  .roster-search { max-width: 100%; }
  .roster-pos-filter { flex-wrap: wrap; }

  /* ── FILTER BAR ── */
  .filter-bar { flex-wrap: wrap; gap: 4px; }
  .filter-btn { font-size: 11px; padding: 4px 9px; }

  /* ── LOGIN ── */
  .login-logo { font-size: 28px; }
  .login-sub { font-size: 13px !important; }
  .role-card-hc { padding: 14px 12px; }
  .role-name-hc { font-size: 20px; }
  .login-btn { font-size: 16px; padding: 12px 32px; }

  /* ── MODAL ── */
  .modal-overlay { padding: .5rem; align-items: flex-end; }
  .modal-box { max-height: 92vh; border-radius: 0; border-top-left-radius: 8px; border-top-right-radius: 8px; }
  .modal-body { padding: 14px; gap: 14px; }
  .field-row { grid-template-columns: 1fr 1fr; }

  /* ── SCHEDULE EDITOR ── */
  .sched-table-wrap { font-size: 11px; }
  .sched-input { font-size: 11px; }

  /* ── ACTIVITY FEED ── */
  .activity-feed { display: none; }

  /* ── SIDELINE ── */
  .mobile-view { max-width: 100%; }
}

/* Desktop: hide menu toggle */
/* ── NOTIFICATION BANNER ── */
.notif-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9999;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  transform: translateY(-100%);
  transition: transform .3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.notif-banner.visible { transform: translateY(0); }
.notif-banner.warning { background: var(--orange); }
.notif-banner.new-period { background: var(--royal-dark); border-bottom: 3px solid var(--orange); }
.notif-banner.done { background: #1a7a40; }
.notif-icon { font-size: 20px; flex-shrink: 0; }
.notif-text { flex: 1; line-height: 1.3; }
.notif-sub { font-size: 12px; font-weight: 400; opacity: .85; font-family: var(--font-body); }
.notif-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.notif-close:hover { color: #fff; }

/* ── DAY DROPDOWN ── */
.day-dropdown-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.day-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--royal-dark);
  border: 1px solid var(--orange);
  border-top: 3px solid var(--orange);
  min-width: 140px;
  z-index: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.day-dropdown.open { display: block; }
.day-dropdown-item {
  padding: 10px 14px;
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .08em;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .1s;
}
.day-dropdown-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
.day-dropdown-item.active { color: var(--orange); border-left-color: var(--orange); }
.topbar-day { cursor: pointer; user-select: none; }
.topbar-day:hover { border-color: var(--orange-mid); }

.menu-toggle { display: none; }
/* ── WHITEBOARD ── */
.wb-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  height: calc(100vh - 140px);
  min-height: 400px;
}
.wb-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.wb-tool-btn {
  padding: 6px 14px;
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: .06em;
  border: 2px solid var(--rule2);
  background: var(--surface2);
  color: #000;
  cursor: pointer;
  transition: all .1s;
}
.wb-tool-btn:hover { border-color: var(--royal-mid); }
.wb-tool-btn.active { background: var(--royal-dark); color: #fff; border-color: var(--royal-dark); }
.wb-tool-btn.clear-btn { background: #a83020; color: #fff; border-color: #a83020; margin-left: auto; }
.wb-tool-btn.clear-btn:hover { background: #8a2518; }
.wb-color-btn {
  width: 28px; height: 28px;
  border: 3px solid transparent;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}
.wb-color-btn.active { border-color: #000; transform: scale(1.2); }
.wb-size-btn {
  padding: 4px 10px;
  font-family: var(--font-body);
  font-size: 12px;
  border: 2px solid var(--rule2);
  background: var(--surface2);
  color: #000;
  cursor: pointer;
}
.wb-size-btn.active { background: var(--royal-dark); color: #fff; border-color: var(--royal-dark); }
.wb-canvas-wrap {
  flex: 1;
  position: relative;
  border: 2px solid var(--rule2);
  background: #2d5a1b;
  overflow: hidden;
  touch-action: none;
}
canvas#wbCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: crosshair;
}
.wb-live-badge {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.6);
  color: #6ee8a0;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  letter-spacing: .08em;
  pointer-events: none;
}

.hidden { display: none !important; }
/* ══════════════════════════════════════════════════════
   PRINT STYLES — clean layout for PDF / paper
   ══════════════════════════════════════════════════════ */
@media print {
  /* Hide everything except the main content */
  #login-screen        { display: none !important; }
  .topbar              { display: none !important; }
  .sidebar             { display: none !important; }
  .sidebar-overlay     { display: none !important; }
  .menu-toggle         { display: none !important; }
  .activity-feed       { display: none !important; }
  .setup-guide         { display: none !important; }
  .export-btn          { display: none !important; }
  .filter-bar          { display: none !important; }
  .roster-toolbar      { display: none !important; }
  .content-header button { display: none !important; }

  /* Full-width content, no scroll container */
  html, body           { background: #fff !important; }
  #app                 { display: block !important; height: auto !important; }
  .main                { display: block !important; overflow: visible !important; }
  .content             { overflow: visible !important; padding: 0 !important; gap: 10px !important; background: #fff !important; }

  /* Tables — expand to full width, no horizontal scroll */
  .script-wrap, .roster-table-wrap,
  .sched-table-wrap    { overflow: visible !important; border: none !important; }
  .script-table,

// ── Firebase helpers ────────────────────────────────────────────────────────
// All paths live under /playscript/ so the database stays tidy
// if you reuse a Firebase project for other things.

function fbSet(path, value) {
  if (!db) return Promise.resolve();
  return set(ref(db, 'playscript/' + path), value);
}
function fbUpdate(path, value) {
  if (!db) return Promise.resolve();
  return update(ref(db, 'playscript/' + path), value);
}
function fbPush(path, value) {
  if (!db) return Promise.resolve();
  return push(ref(db, 'playscript/' + path), value);
}
function fbOn(path, event, cb) {
  if (!db) return;
  onValue(ref(db, 'playscript/' + path), snap => cb(snap.val()));
}
function fbOnce(path, cb) {
  if (!db) return;
  get(ref(db, 'playscript/' + path)).then(snap => cb(snap.val()));
}
function fbRemove(path) {
  if (!db) return;
  remove(ref(db, 'playscript/' + path));
}
// Presence: mark user online, auto-remove on disconnect
function fbPresence(roleId, roleName, color) {
  if (!db) return;
  const presRef = ref(db, 'playscript/presence/' + roleId);
  set(presRef, { id: roleId, name: roleName, color, online: true, ts: Date.now() });
  // onDisconnect is not available in modular SDK the same way — use remove on beforeunload instead

}

var currentRole='';

// ── ATTENDANCE ────────────────────────────────────────────────────────────
// attendance[playerId] = true (present) | false (absent)
// Stored per-day in Firebase at playscript/attendance/{day}
var attendance = {}; // keyed by player id, true=present false=absent

function isPresent(playerId) {
  return attendance[playerId] !== false; // default true
}

function toggleAttendance(playerId) {
  const current = isPresent(playerId);
  attendance[playerId] = !current;
  // Sync to Firebase
  if (db) set(ref(db, 'playscript/attendance/' + currentDay + '/' + playerId), !current);
  // Partial re-render of just the attendance cell
  const cell = document.getElementById('att_' + playerId);
  if (cell) cell.innerHTML = attendanceBtn(playerId);
  // Update subtitle counts
  updateAttendanceCounts();
}

function markAllPresent() {
  PLAYERS.forEach(p => { attendance[p.id] = true; });
  if (db) {
    const obj = {};
    PLAYERS.forEach(p => { obj[p.id] = true; });
    set(ref(db, 'playscript/attendance/' + currentDay), obj);
  }
  render();
}

function updateAttendanceCounts() {
  const presentCount = PLAYERS.filter(p => isPresent(p.id)).length;
  const metaEl = document.getElementById('attendanceMeta');
  if (metaEl) metaEl.textContent = presentCount + ' OF ' + PLAYERS.length + ' PRESENT';
}

function attendanceBtn(playerId) {
  const present = isPresent(playerId);
  return present
    ? '<button onclick="window.toggleAttendance(\'' + playerId + '\')" style="padding:2px 10px;background:#1a7a40;color:#fff;border:none;font-family:var(--font-display);font-size:12px;letter-spacing:.04em;cursor:pointer;min-width:56px">HERE</button>'
    : '<button onclick="window.toggleAttendance(\'' + playerId + '\')" style="padding:2px 10px;background:#a83020;color:#fff;border:none;font-family:var(--font-display);font-size:12px;letter-spacing:.04em;cursor:pointer;min-width:56px">ABSENT</button>';
}

function initAttendanceSync() {
  if (!db) return;
  onValue(ref(db, 'playscript/attendance/' + currentDay), snap => {
    const val = snap.val();
    if (val) {
      Object.keys(val).forEach(id => { attendance[id] = val[id]; });
    }
    // Refresh attendance cells if on roster or edit roster view
    if (currentView === 'players' || currentView === 'roster') render();
    updateAttendanceCounts();
  });
}

// Script data: day -> period index -> pos -> drill
const scriptData={};
['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(day=>{
  scriptData[day]={};
  SCHEDULE.forEach((row,ri)=>{
    scriptData[day][ri]={};
    POS_LIST.forEach(pos=>{
      const d=DRILLS_BY_DAY[day]&&DRILLS_BY_DAY[day][pos];
      if(row.type==='indy'){
        const isWeak=row.period.includes('weak');
        scriptData[day][ri][pos]=d?(isWeak?d[1]:d[0]):'Full team';
      } else if(row.type==='combo'){
        if(['QB','RB','WR','TE'].includes(pos)) scriptData[day][ri][pos]='Combo — offense';
        else if(pos==='OL') scriptData[day][ri][pos]='OL vs DL';
        else if(pos==='DL') scriptData[day][ri][pos]='DL vs OL';
        else if(['LB','DB'].includes(pos)) scriptData[day][ri][pos]='7-on-7 coverage';
        else scriptData[day][ri][pos]='ST / film';
      } else if(row.type==='team'){
        if(row.period.includes('offense')) scriptData[day][ri][pos]=['QB','RB','WR','TE','OL'].includes(pos)?'11-on-11 reps':'Scout / film';
        else if(row.period.includes('defense')) scriptData[day][ri][pos]=['DL','LB','DB'].includes(pos)?'11-on-11 reps':'Scout / film';
        else if(row.period.includes('Special')) scriptData[day][ri][pos]='ST units';
        else scriptData[day][ri][pos]='Full team';
      } else {
        scriptData[day][ri][pos]='Full team';
      }
    });
  });
});

// ── ACTIVITY ───────────────────────────────────────────────────────────────
function pushActivity(coach, text, color, roleId) {
  const now = new Date();
  const entry = {
    coach, text, color,
    roleId: roleId || currentRole,
    time: `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`
  };
  // Always add to local log immediately
  activityLog.unshift(entry);
  if (activityLog.length > 8) activityLog.pop();
  const feed = document.getElementById('activityFeed');
  if (feed) renderFeed(feed);
  // Push to Firebase so other coaches see it
  if (FIREBASE_READY) {
    fbPush('activity', entry);
    // Trim old entries (keep last 50) — lightweight cleanup
    get(ref(db, 'playscript/activity')).then(snap => {
      const keys = snap.val() ? Object.keys(snap.val()) : [];
      if (keys.length > 50) {
        keys.slice(0, keys.length - 50).forEach(k =>
          remove(ref(db, 'playscript/activity/' + k))
        );
      }
    });
  }
}

// Keep old name working for any internal calls
function addActivity(coach, text, color) {
  pushActivity(coach, text, color, currentRole);
}

      };

      const card = document.createElement('div');
      card.className = 'role-card';
      card.innerHTML = `<div class="role-name">${r.label}</div>`;
      card.onclick = () => {
        document.querySelectorAll('.role-card, .role-card-hc').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedRoleId = r.id;
        document.getElementById('loginBtn').classList.add('active');
      };
      grid.appendChild(card);
    }
  });
});

function doLogout(){
  if(db) remove(ref(db, 'playscript/presence/'+currentRole));
  if(sidelineInterval) { clearInterval(sidelineInterval); sidelineInterval = null; }
  selectedRoleId=null;
  currentRole='';
  currentView='script';
  // Revert injected HC nav items back to placeholders for next login
  const rn = document.getElementById('nav-roster');
  if (rn) rn.outerHTML = '<div id="nav-roster-placeholder"></div>';
  const sn = document.getElementById('nav-schedule');
  if (sn) sn.outerHTML = '<div id="nav-schedule-placeholder"></div>';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  const mgLabel2 = document.getElementById('mygroupLabel');
  if (mgLabel2) mgLabel2.textContent = 'My Group';
  document.querySelectorAll('.role-card, .role-card-hc').forEach(c=>c.classList.remove('selected'));
  document.getElementById('loginBtn').classList.remove('active');
}

function doLogin(){
  if(!selectedRoleId) return;
  currentRole=selectedRoleId;
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');
  app.classList.add('visible');
  const r=ROLES.find(x=>x.id===selectedRoleId);
  const badge=document.getElementById('roleBadge');
  badge.textContent=r.label;
  badge.style.color='#ffffff';
  badge.style.border='1px solid #fff';

  // ── Firebase: announce presence ──────────────────────────────────────────
  fbPresence(r.id, r.label, r.color);

  // ── Firebase: listen for presence changes from all coaches ───────────────
  fbOn('presence', 'value', (data) => {
    onlineCoaches = data ? Object.values(data) : [];
    renderPresence();
  });

  // ── Firebase: listen for drill edits from other coaches ──────────────────
  fbOn('script', 'value', (data) => {
    if (!data) return;
    // Merge remote data into local scriptData
    Object.entries(data).forEach(([day, periods]) => {
      if (!scriptData[day]) return;
      Object.entries(periods).forEach(([ri, posMap]) => {
        if (!scriptData[day][ri]) return;
        Object.entries(posMap).forEach(([pos, val]) => {
          if (scriptData[day][ri][pos] !== val) {
            scriptData[day][ri][pos] = val;
            // Only re-render if we're currently viewing that day/script
            if (currentView === 'script' && currentDay === day) {
              render();
            }
          }
        });
      });
    });
  });

  // ── Firebase: listen for activity feed entries ───────────────────────────
  fbOn('activity', 'child_added', (item) => {
    if (!item) return;
    // Don't duplicate our own entries (already in local log)
    if (item.roleId === currentRole) return;
    activityLog.unshift(item);
    if (activityLog.length > 8) activityLog.pop();
    const feed = document.getElementById('activityFeed');
    if (feed) renderFeed(feed);
  });

  // ── Push our join event ──────────────────────────────────────────────────
  pushActivity(r.label, 'joined the session', r.color, r.id);

  // ── Seed Firebase with default script data if nothing exists yet ─────────
  if (FIREBASE_READY) {
    get(ref(db, 'playscript/script')).then(snap => {
      if (!snap.exists()) {
        set(ref(db, 'playscript/script'), scriptData);
      }
    });
    // NOTE: Schedule is always loaded from the hardcoded default on login.
    // This prevents stale/corrupted schedule data in Firebase from breaking the clock.
    // HC clears stale practice data and starts sync
    // Position coaches sync from Firebase immediately
    if (currentRole === 'HC') {
      // Clear local state unconditionally
      practiceStartTime = null;
      practicePausedAt = null;
      practiceStartedThisSession = false;
      // Clear stale Firebase data — schedule, practice start, pause
      remove(ref(db, 'playscript/practiceStart'));
      remove(ref(db, 'playscript/practicePaused'));
      remove(ref(db, 'playscript/schedule'));
      initRoster();
      initSidelineSync();
      initAttendanceSync();
      initPeriodOffsetSync();
      initRepSync();
      initAlertSync();
    } else {
      initRoster();
      initSidelineSync();
      initAttendanceSync();
      initPeriodOffsetSync();
      initRepSync();
      initAlertSync();
    }
  }

  // Show Firebase sync badge if configured
  renderPresence();

  // Build HC-only nav items directly in the DOM
  if (currentRole === 'HC') {
    const rp = document.getElementById('nav-roster-placeholder');
    const sp = document.getElementById('nav-schedule-placeholder');
    if (rp) rp.outerHTML = '<div class="sidebar-item" onclick="window.setView(\'roster\')" id="nav-roster">Edit Roster</div>';
    if (sp) sp.outerHTML = '<div class="sidebar-item" onclick="window.setView(\'schedule\')" id="nav-schedule">Edit Schedule</div>';
  }
  // Update My Group sidebar label to reflect coach role

// ── SIDELINE VIEW — clock-anchored real-time ──────────────────────────────

// Convert "3:40" time string to minutes since midnight
function timeStrToMins(t) {
  const parts = t.split(':').map(Number);
  return parts[0] * 60 + (parts[1] || 0);
}

// Given practiceStartTime (ms), return {periodIdx, secsLeft, secsDone, totalSecs}
function calcCurrentPeriod(startMs, nowMs) {
  const elapsedSecs = Math.floor(((nowMs || Date.now()) - Number(startMs)) / 1000);
  if (elapsedSecs < 0) return null;

  // Build cumulative seconds, applying any per-period offsets
  // periodOffsets[i] > 0 = extra time added, < 0 = time removed (skip)
  let cursor = 0;
  for (let i = 0; i < SCHEDULE.length; i++) {
    const row = SCHEDULE[i];
    let dur = Math.max(0, (timeStrToMins(row.end) - timeStrToMins(row.start)) * 60);
    // Apply offset: negative offset skips forward, positive adds time
    const offset = (periodOffsets[i] || 0) / 1000; // convert ms to secs
    dur = Math.max(0, dur + offset);
    if (dur <= 0) { cursor += 0; continue; } // period fully skipped
    if (elapsedSecs < cursor + dur) {
      return {
        periodIdx: i,
        secsLeft:  Math.ceil(cursor + dur - elapsedSecs),
        secsDone:  elapsedSecs - cursor,
        totalSecs: dur
      };
    }
    cursor += dur;
  }
  return { periodIdx: -1, secsLeft: 0, secsDone: 0, totalSecs: 0 };
}

function fmtTime(secs) {
  const m = Math.floor(Math.abs(secs) / 60);
  const s = String(Math.abs(secs) % 60).padStart(2,'0');
  return m + ':' + s;
}

let practiceStartTime = null; // ms epoch when practice started (adjusted for pauses)
let practicePausedAt  = null; // ms epoch when practice was paused, null if running
let periodOffsets     = {};   // {periodIdx: offsetMs} — adjustments applied to specific periods

function startPractice() {
  practiceStartTime = Date.now();
  practicePausedAt  = null;
  practiceStartedThisSession = true;
  lastNotifPeriodIdx = -1;
  warned15 = false;
  if (db) {
    set(ref(db, 'playscript/practiceStart'), practiceStartTime);
    remove(ref(db, 'playscript/practicePaused'));
  }
  renderAndTickSideline();
  renderSidelineControls();
}

function pausePractice() {
  if (!practiceStartTime || practicePausedAt) return;
  practicePausedAt = Date.now();
  if (db) set(ref(db, 'playscript/practicePaused'), practicePausedAt);
  renderSidelineControls();
}

function resumePractice() {
  if (!practicePausedAt) return;
  // Shift start time forward by how long we were paused
  const pauseDuration = Date.now() - practicePausedAt;
  practiceStartTime += pauseDuration;
  practicePausedAt = null;
  if (db) {
    set(ref(db, 'playscript/practiceStart'), practiceStartTime);
    remove(ref(db, 'playscript/practicePaused'));
  }
  renderAndTickSideline();
  renderSidelineControls();
}

function resetPractice() {
  practiceStartTime = null;
  practicePausedAt  = null;
  practiceStartedThisSession = false;
  lastNotifPeriodIdx = -1;
  warned15 = false;
  resetPeriodOffsets();
  dismissNotif();
  if (db) {
    remove(ref(db, 'playscript/practiceStart'));
    remove(ref(db, 'playscript/practicePaused'));
  }
  if (sidelineInterval) { clearInterval(sidelineInterval); sidelineInterval = null; }
  renderSideline(document.getElementById('mainContent'));
}

function renderSidelineControls() {

  if (notStarted) {
    el.innerHTML =

      '<button disabled style="' + disStyle + '">+5m</button>' +
      '<button disabled style="' + disStyle + '">RESET</button>';

  }

  const pauseResumeBtn = isRunning
    ? '<button onclick="window.pausePractice()"  style="' + grayBtn + ';background:#a83020;min-width:96px">⏸ PAUSE</button>'
    : '<button onclick="window.resumePractice()" style="' + grayBtn + ';background:#2e8b2e;min-width:96px">▶ RESUME</button>';

    '<button onclick="window.addTimeToPeriod(5)" style="' + grayBtn + '">+5m</button>' +
    '<button onclick="window.resetPractice()"   style="' + grayBtn + '">RESET</button>' +
    '<span style="display:inline-block;width:1px;height:28px;background:rgba(255,255,255,0.1);margin:0 8px;vertical-align:middle"></span>' +

      : '<button onclick="window.triggerWeatherHold()" style="padding:7px 10px;background:#1a5fa8;color:#fff;border:none;font-family:var(--font-display);font-size:12px;letter-spacing:.06em;cursor:pointer;border-radius:2px;margin-left:0">⛈ WEATHER</button>'

// Renders a period overview strip showing all periods with status dots
function renderPeriodStrip() {
  const status = practiceStartTime
    ? (practicePausedAt ? calcCurrentPeriod(practiceStartTime, practicePausedAt) : calcCurrentPeriod(practiceStartTime))
    : null;
  const currentIdx = status ? status.periodIdx : -1;

  return '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 6px">' +
    SCHEDULE.map((row, i) => {
      const isDone    = currentIdx > i || currentIdx === -1;
      const isCurrent = currentIdx === i;
      const bg     = isCurrent ? '#333' : isDone ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)';
      const color  = isCurrent ? '#fff' : isDone ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.5)';
      const border = isCurrent ? '2px solid #999' : '1px solid rgba(255,255,255,0.1)';
      return '<div style="padding:6px 14px;background:' + bg + ';color:' + color + ';border:' + border + ';font-family:var(--font-display);font-size:13px;letter-spacing:.06em;white-space:nowrap;' + (isDone&&!isCurrent?'text-decoration:line-through':'') + '">' +
        row.period +
      '</div>';
    }).join('') +
  '</div>';
}

// ── NOTIFICATION SYSTEM ────────────────────────────────────────────────────
let lastNotifPeriodIdx = -1;
let warned15 = false;
let notifDismissTimer = null;
let pushGranted = false;

function requestPushPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { pushGranted = true; return; }
  if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => { pushGranted = p === 'granted'; });
  }
}

function showBanner(type, icon, title, sub, autoDismissSecs) {
  const banner = document.getElementById('notifBanner');
  const iconEl = document.getElementById('notifIcon');
  const titleEl = document.getElementById('notifTitle');
  const subEl   = document.getElementById('notifSub');
  if (!banner) return;

  // Clear any pending auto-dismiss
  if (notifDismissTimer) clearTimeout(notifDismissTimer);

  // Remove old type classes
  banner.classList.remove('warning', 'new-period', 'done');
  banner.classList.add(type);

  iconEl.textContent  = icon;
  titleEl.textContent = title;
  subEl.textContent   = sub;

  banner.classList.add('visible');

  if (autoDismissSecs) {
    notifDismissTimer = setTimeout(() => dismissNotif(), autoDismissSecs * 1000);
  }

  // Also send browser push notification if permission granted
  if (pushGranted && Notification.permission === 'granted') {
    try {
      new Notification(title, { body: sub, icon: '', silent: false });
    } catch(e) {}
  }
}

function dismissNotif() {
  const banner = document.getElementById('notifBanner');
  if (banner) banner.classList.remove('visible');
  if (notifDismissTimer) clearTimeout(notifDismissTimer);
}

// Called from tickSideline — checks whether we need to fire a notification
function checkNotifications(displayStatus) {
  if (!displayStatus || displayStatus.periodIdx === -1) return;
  if (practicePausedAt) return; // no notifications while paused

  const idx = displayStatus.periodIdx;
  const secsLeft = displayStatus.secsLeft;
  const row = SCHEDULE[idx];
  const pos = currentRole === 'HC' ? 'QB' : currentRole;
  const drill = (scriptData[currentDay] && scriptData[currentDay][idx] && scriptData[currentDay][idx][pos]) || 'Full team';

  // New period started
  if (idx !== lastNotifPeriodIdx) {
    lastNotifPeriodIdx = idx;
    warned15 = false;
    const nextRow = SCHEDULE[idx + 1];
    showBanner(
      'new-period',
      '▶',
      row.period.toUpperCase(),
      drill + (nextRow ? ' · Up next: ' + nextRow.period : ''),
      6
    );
  }

  // 15-second warning
  if (!warned15 && secsLeft <= 15 && secsLeft > 0) {
    warned15 = true;
    const nextRow = SCHEDULE[idx + 1];
    showBanner(
      'warning',
      '⚠',
      '15 SECONDS — ' + row.period.toUpperCase() + ' ENDING',
      nextRow ? 'Up next: ' + nextRow.period : 'Practice complete after this period',
      12
    );
  }

  // Practice complete
  if (idx === -1 && lastNotifPeriodIdx !== -999) {
    lastNotifPeriodIdx = -999;
    showBanner('done', '✓', 'PRACTICE COMPLETE', 'Great work today!', 10);
  }
}

window.dismissNotif = dismissNotif;


// Build player chips for a given position group and schedule row
function buildPlayerChips(myPos, row) {
  const unit = row ? (row.unit || 'all') : 'all';
  const periodType = row ? row.type : 'tempo';

  const groupPlayers = PLAYERS.filter(p => {
    const ppos = playerGroupForType(p, periodType);
    return ppos === myPos || p.pos === myPos || p.primaryPos === myPos;
  });

  // Sort: present first, absent last
  groupPlayers.sort((a,b) => (isPresent(b.id)?1:0) - (isPresent(a.id)?1:0));

  const unitPlayers = unit === 'all' ? groupPlayers : groupPlayers.filter(p => {
    const d = (p.depth && p.depth[myPos] !== undefined) ? p.depth[myPos] : 1;
    if (unit === '1st')   return d === 1;
    if (unit === '2nd')   return d === 2;
    if (unit === '3rd')   return d === 3;
    if (unit === 'scout') return d === 0;
    return true;
  });

  if (!unitPlayers.length) return '';

  const chips = unitPlayers.map(p => {
    const reps    = getReps(p.id);
    const present = isPresent(p.id);
    const dot = present
      ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2e8b2e;margin-right:5px;vertical-align:middle;flex-shrink:0"></span>'
      : '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#a83020;margin-right:5px;vertical-align:middle;flex-shrink:0"></span>';
    const repBadge = '<span id="repbadge_' + p.id + '" style="' +
      'display:inline-flex;align-items:center;justify-content:center;' +
      'min-width:20px;height:20px;padding:0 4px;margin-left:6px;flex-shrink:0;' +
      'background:' + (reps > 0 ? 'var(--royal-dark)' : 'var(--rule2)') + ';' +
      'color:' + (reps > 0 ? '#fff' : 'var(--ink4)') + ';' +
      'font-family:var(--font-mono);font-size:10px;font-weight:700;border-radius:10px">' +
      reps + '</span>';
    return '<div id="chip_' + p.id + '" ' +
      'onclick="window.addRep(\'' + p.id + '\')" ' +
      'oncontextmenu="event.preventDefault();window.removeRep(\'' + p.id + '\')" ' +
      'ontouchstart="window._repTimer=setTimeout(()=>{window.removeRep(\'' + p.id + '\');window._repLong=true;},500);window._repLong=false" ' +
      'ontouchend="clearTimeout(window._repTimer);if(window._repLong)event.preventDefault()" ' +
      'title="Tap to add rep · Hold to remove" ' +
      'style="' +
      'display:flex;align-items:center;padding:6px 10px;' +
      'background:' + (reps > 0 ? '#eef2ff' : 'var(--surface2)') + ';' +
      'border:1px solid ' + (reps > 0 ? 'var(--royal-dark)' : 'var(--rule)') + ';' +
      'font-size:12px;cursor:pointer;user-select:none;transition:all .1s;' +
      (!present ? 'opacity:0.45;' : '') + '">' +
      dot +
      '<span style="font-family:var(--font-mono);color:var(--ink3);font-size:10px;margin-right:4px">#' + p.num + '</span>' +
      '<span style="font-family:var(--font-body);font-weight:600;color:var(--ink)">' + p.name + '</span>' +
      repBadge +
    '</div>';
  }).join('');

  return '<div style="margin-top:8px">' +
    '<div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);margin-bottom:8px">PLAYERS</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips + '</div>' +
  '</div>';
}


// ── REP COUNTER ────────────────────────────────────────────────────────────
// reps[day][playerId] = count
// Stored in Firebase at playscript/reps/{day}/{playerId}
var repData = {}; // keyed: repData[playerId] = count for currentDay

function getReps(playerId) {
  return repData[playerId] || 0;
}

function addRep(playerId) {
  repData[playerId] = (repData[playerId] || 0) + 1;
  const reps = repData[playerId];
  if (db) set(ref(db, 'playscript/reps/' + currentDay + '/' + playerId), reps);
  updateRepChip(playerId, reps);
}

function removeRep(playerId) {
  const current = repData[playerId] || 0;
  if (current <= 0) return;
  repData[playerId] = current - 1;
  const reps = repData[playerId];
  if (db) set(ref(db, 'playscript/reps/' + currentDay + '/' + playerId), reps);
  updateRepChip(playerId, reps);
}

function updateRepChip(playerId, reps) {
  const badge = document.getElementById('repbadge_' + playerId);
  const chip  = document.getElementById('chip_' + playerId);
  const tableChip = document.getElementById('rep_' + playerId);
  if (badge) {
    badge.textContent = reps;
    badge.style.background = reps > 0 ? 'var(--royal-dark)' : 'var(--rule2)';
    badge.style.color = reps > 0 ? '#fff' : 'var(--ink4)';
  }
  if (chip) {
    chip.style.background = reps > 0 ? '#eef2ff' : 'var(--surface2)';
    chip.style.borderColor = reps > 0 ? 'var(--royal-dark)' : 'var(--rule)';
  }
  if (tableChip) tableChip.textContent = reps;
}

window.removeRep = removeRep;

function resetReps() {
  repData = {};
  if (db) remove(ref(db, 'playscript/reps/' + currentDay));
  render();
}

function initRepSync() {
  if (!db) return;
  onValue(ref(db, 'playscript/reps/' + currentDay), snap => {
    const val = snap.val();
    repData = val ? {...val} : {};
    if (currentView === 'reps') render();
    PLAYERS.forEach(p => {
      const reps  = getReps(p.id);
      const badge = document.getElementById('repbadge_' + p.id);
      const chip  = document.getElementById('chip_' + p.id);
      const tableChip = document.getElementById('rep_' + p.id);
      if (badge) { badge.textContent = reps; badge.style.background = reps>0?'var(--royal-dark)':'var(--rule2)'; badge.style.color = reps>0?'#fff':'var(--ink4)'; }
      if (chip)  { chip.style.background = reps>0?'#eef2ff':'var(--surface2)'; chip.style.borderColor = reps>0?'var(--royal-dark)':'var(--rule)'; }
      if (tableChip) tableChip.textContent = reps;
    });
  });
}

function renderRepCounter(el) {
  const myPos = currentRole === 'HC' ? null : currentRole;

  // Get players - HC sees all, position coaches see their group
  const players = myPos
    ? PLAYERS.filter(p => p.pos === myPos || p.primaryPos === myPos)
    : [...PLAYERS];

  players.sort((a,b) => getReps(b.id) - getReps(a.id));

  const totalReps = players.reduce((sum, p) => sum + getReps(p.id), 0);
  const zeroReps  = players.filter(p => getReps(p.id) === 0).length;

  const rows = players.map(p => {
    const reps = getReps(p.id);
    const pct  = totalReps > 0 ? Math.round((reps / Math.max(...players.map(q=>getReps(q.id)),1)) * 100) : 0;
    const present = isPresent(p.id);
    return '<tr style="' + (!present?'opacity:0.4':'') + '">' +
      '<td style="font-family:var(--font-mono);font-size:11px;text-align:center;color:var(--ink3);width:36px">#' + p.num + '</td>' +
      '<td style="font-weight:600;font-size:13px;padding:8px 10px">' + p.name + '</td>' +
      '<td style="width:60px;text-align:center">' +
        '<button onclick="window.addRep(\'' + p.id + '\')" style="width:44px;height:44px;background:' + (reps>0?'var(--royal-dark)':'var(--surface2)') + ';color:' + (reps>0?'#fff':'var(--ink3)') + ';border:1px solid var(--rule2);font-family:var(--font-display);font-size:18px;cursor:pointer;letter-spacing:0">' +
          '<span id="rep_' + p.id + '">' + reps + '</span>' +
        '</button>' +
      '</td>' +
      '<td style="padding:0 10px;min-width:80px">' +
        '<div style="height:6px;background:var(--rule);border-radius:3px;overflow:hidden">' +
          '<div style="height:6px;background:' + (reps===0?'var(--rule)':reps===Math.max(...players.map(q=>getReps(q.id)))&&reps>0?'var(--orange)':'var(--royal-dark)') + ';width:' + pct + '%;transition:width .3s"></div>' +
        '</div>' +
      '</td>' +
    '</tr>';
  }).join('');

  el.innerHTML =
    '<div class="content-header">' +
      '<span class="content-title">REP COUNTER</span>' +
      '<span class="content-meta">' + totalReps + ' TOTAL REPS · ' + zeroReps + ' NO REPS</span>' +
      '<div style="flex:1"></div>' +
      (currentRole === 'HC' ? '<button onclick="window.resetReps()" style="padding:6px 14px;background:transparent;border:1px solid var(--rule2);color:var(--ink3);font-family:var(--font-display);font-size:12px;letter-spacing:.06em;cursor:pointer">RESET DAY</button>' : '') +
    '</div>' +
    '<div style="font-size:12px;color:var(--ink3);font-family:var(--font-body);margin-bottom:10px">Tap a number to add a rep. Sorted by most reps. Orange bar = leader.</div>' +
    '<div class="roster-table-wrap">' +
      '<table class="roster-table" style="width:100%">' +
        '<thead><tr>' +
          '<th style="text-align:center;width:36px">#</th>' +
          '<th>Player</th>' +
          '<th style="text-align:center;width:60px">Reps</th>' +
          '<th>Load</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>';
}

window.addRep   = addRep;
window.resetReps = resetReps;


// ── INJURY FLAG & WEATHER HOLD ────────────────────────────────────────────
var weatherHold = false;

function triggerWeatherHold() {
  weatherHold = true;
  // Pause practice clock if running
  if (practiceStartTime && !practicePausedAt) pausePractice();
  // Write to Firebase so all devices get it
  if (db) set(ref(db, 'playscript/weatherHold'), true);
  showBanner('warning', '⛈', 'WEATHER HOLD — GET INSIDE', 'Practice suspended. All coaches check in.', null);
  renderSidelineControls();
}

function clearWeatherHold() {
  weatherHold = false;
  if (db) remove(ref(db, 'playscript/weatherHold'));
  dismissNotif();
  renderSidelineControls();
}

function flagInjury(playerName) {
  const msg = playerName || prompt('Player name or jersey number?');
  if (!msg) return;
  const text = msg.trim();
  // Push injury alert to Firebase so all coaches see it
  if (db) set(ref(db, 'playscript/injuryAlert'), {player: text, ts: Date.now()});
  showBanner('warning', '🚑', 'TRAINER — ' + text.toUpperCase(), 'Injury flag raised. Check field immediately.', null);
}

function clearInjuryAlert() {
  if (db) remove(ref(db, 'playscript/injuryAlert'));
  dismissNotif();
}

function openInjuryModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'injuryModal';
  overlay.innerHTML =
    '<div class="modal-box" style="max-width:420px">' +
      '<div class="modal-header">' +
        '<span class="modal-title" style="color:#a83020">🚑 INJURY FLAG</span>' +
        '<button class="modal-close" onclick="document.getElementById(\'injuryModal\').remove()">&#x2715;</button>' +
      '</div>' +
      '<div class="modal-body" style="gap:10px">' +
        '<div style="font-size:13px;color:#000;font-family:var(--font-body)">Search for a player or type a name, then tap ALERT ALL COACHES.</div>' +
        '<input id="injuryPlayerInput" placeholder="Type jersey # or name to search..." style="width:100%;padding:10px;border:1px solid var(--rule2);font-size:14px;font-family:var(--font-body);box-sizing:border-box" autocomplete="off">' +
        '<div id="injuryPlayerList" style="display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto"></div>' +
      '</div>' +
      '<div class="modal-footer">' +
        '<button class="cancel-btn" onclick="document.getElementById(\'injuryModal\').remove()">CANCEL</button>' +
        '<button class="save-btn" style="background:#a83020" onclick="window.submitInjury()">🚑 ALERT ALL COACHES</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  // Build player list renderer
  function renderInjuryList(filter) {
    const list = document.getElementById('injuryPlayerList');
    if (!list) return;
    const q = (filter || '').toLowerCase().trim();
    const shown = PLAYERS
      .filter(p => isPresent(p.id))
      .filter(p => !q || p.name.toLowerCase().includes(q) || String(p.num).includes(q))
      .sort((a,b) => a.num - b.num);
    list.innerHTML = shown.map(p =>
      '<button onclick="window.submitInjury(\'' + p.num + ' ' + p.name + '\')" ' +
      'style="padding:6px 12px;background:var(--surface2);border:1px solid var(--rule2);font-size:13px;font-family:var(--font-body);cursor:pointer;text-align:left;border-radius:2px">' +
        '#' + p.num + ' ' + p.name +
      '</button>'
    ).join('') || '<span style="font-size:12px;color:var(--ink3);font-family:var(--font-body)">No players found</span>';
  }

  // Wire up live search — oninput fires on every keystroke
  setTimeout(() => {
    const inp = document.getElementById('injuryPlayerInput');
    if (inp) {
      inp.focus();
      inp.addEventListener('input', () => renderInjuryList(inp.value));
      renderInjuryList(''); // show all players initially
    }
  }, 50);
}

function submitInjury(name) {
  let text = name;
  if (!text) {
    const inp = document.getElementById('injuryPlayerInput');
    text = inp ? inp.value.trim() : '';
  }
  if (!text) {
    const inp = document.getElementById('injuryPlayerInput');
    if (inp) inp.focus();
    return;
  }
  const overlay = document.getElementById('injuryModal');
  if (overlay) overlay.remove();
  flagInjury(text);
}

function initAlertSync() {
  if (!db) return;
  // Weather hold sync
  onValue(ref(db, 'playscript/weatherHold'), snap => {
    const val = snap.val();
    if (val && !weatherHold) {
      weatherHold = true;
      showBanner('warning', '⛈', 'WEATHER HOLD — GET INSIDE', 'Practice suspended. All coaches check in.', null);
      renderSidelineControls();
    } else if (!val && weatherHold) {
      weatherHold = false;
      dismissNotif();
      renderSidelineControls();
    }
  });
  // Injury alert sync — position coaches receive HC alerts
  onValue(ref(db, 'playscript/injuryAlert'), snap => {
    const val = snap.val();
    if (val && val.player) {
      showBanner('warning', '🚑', 'TRAINER — ' + val.player.toUpperCase(), 'Injury flag raised. Check field immediately.', null);
    }

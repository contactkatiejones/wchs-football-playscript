// ── DYNAMIC PERIOD MANAGEMENT ─────────────────────────────────────────────
function applyPeriodOffset(periodIdx, offsetMs) {
  periodOffsets[periodIdx] = (periodOffsets[periodIdx] || 0) + offsetMs;
  // Sync to Firebase
  if (db) set(ref(db, 'playscript/periodOffsets'), periodOffsets);
  // Refresh sideline immediately
  lastNotifPeriodIdx = -1;
  warned15 = false;
  if (currentView === 'sideline') tickSideline();
}

function skipPeriod() {
  if (!practiceStartTime) return;
  const status = calcCurrentPeriod(practiceStartTime);
  if (!status || status.periodIdx < 0) return;
  const secsLeft = status.secsLeft;
  // Subtract remaining time from this period so it ends now
  applyPeriodOffset(status.periodIdx, -secsLeft * 1000);
  showBanner('new-period', '▶', 'PERIOD SKIPPED', 'Advanced to next period', 3);
}

function addTimeToPeriod(mins) {
  if (!practiceStartTime) return;
  const status = calcCurrentPeriod(practiceStartTime);
  if (!status || status.periodIdx < 0) return;
  applyPeriodOffset(status.periodIdx, mins * 60 * 1000);
  showBanner('new-period', '+', mins + ' MIN ADDED', SCHEDULE[status.periodIdx].period, 3);
}

function initPeriodOffsetSync() {
  if (!db) return;
  onValue(ref(db, 'playscript/periodOffsets'), snap => {
    const val = snap.val();
    periodOffsets = val ? {...val} : {};
    // Re-key as numbers since Firebase stringifies keys
    const numeric = {};
    Object.entries(periodOffsets).forEach(([k,v]) => { numeric[Number(k)] = v; });
    periodOffsets = numeric;
    if (currentView === 'sideline') tickSideline();
  });
}

function resetPeriodOffsets() {
  periodOffsets = {};
  if (db) remove(ref(db, 'playscript/periodOffsets'));
}

window.skipPeriod      = skipPeriod;
window.addTimeToPeriod = addTimeToPeriod;

function renderAndTickSideline() {
  sidelineInterval = setInterval(() => {
    // Always check for notifications even if not on sideline view
    if (practiceStartTime && !practicePausedAt) {
      const st = practicePausedAt ? calcCurrentPeriod(practiceStartTime, practicePausedAt) : calcCurrentPeriod(practiceStartTime);
      if (st) checkNotifications(st);
    }
    if (currentView !== 'sideline') return;
    tickSideline();
  }, 1000);
  tickSideline(); // immediate first tick
}

function tickSideline() {
  const status = practiceStartTime ? calcCurrentPeriod(practiceStartTime) : null;
  const timerEl = document.getElementById('sidelineTimer');
  const periodEl = document.getElementById('sidelinePeriodName');
  const drillEl  = document.getElementById('sidelineDrill');
  const nextEl   = document.getElementById('sidelineNextContent');
  const barEl    = document.getElementById('sidelineBar');

  if (!timerEl) return;

  if (!status || !practiceStartTime) {
    timerEl.textContent = '--:--';
    return;
  }

  // When paused, freeze by using the pause moment as "now"
  const displayStatus = practicePausedAt
    ? calcCurrentPeriod(practiceStartTime, practicePausedAt)
    : status;

  if (displayStatus.periodIdx === -1) {
    timerEl.textContent = 'DONE';
    if (periodEl) periodEl.textContent = 'PRACTICE COMPLETE';
    return;
  }

  const row = SCHEDULE[displayStatus.periodIdx];
  const pos = currentRole === 'HC' ? 'QB' : currentRole;
  const drill = (scriptData[currentDay] && scriptData[currentDay][displayStatus.periodIdx] && scriptData[currentDay][displayStatus.periodIdx][pos]) || 'Full team';

  timerEl.textContent = fmtTime(displayStatus.secsLeft);
  if (periodEl) periodEl.textContent = row.period.toUpperCase();
  if (drillEl)  drillEl.textContent  = drill;

  // Update unit label in header
  const unitLabelEl = document.getElementById('sidelineUnit');
  if (unitLabelEl) unitLabelEl.innerHTML = unitPill(row.unit||'all');

  // ── Item 1: Players in current unit for this group ────────────────────
  const playersEl = document.getElementById('sidelinePlayers');
  if (playersEl) {
    const myPos = currentRole === 'HC' ? 'QB' : currentRole;
    const unit  = row.unit || 'all';

    // Get players in my group routed here for this period type
    const groupPlayers = PLAYERS.filter(p => {
      const ppos = playerGroupForType(p, row.type);
      return ppos === myPos || p.pos === myPos || p.primaryPos === myPos;
    });

    // Filter by unit if not 'all'
    groupPlayers.sort((a,b) => (isPresent(b.id)?1:0) - (isPresent(a.id)?1:0));
    const unitPlayers = unit === 'all' ? groupPlayers : groupPlayers.filter(p => {
      const d = (p.depth && p.depth[myPos] !== undefined) ? p.depth[myPos] : 1;
      if (unit === '1st')   return d === 1;
      if (unit === '2nd')   return d === 2;
      if (unit === '3rd')   return d === 3;
      if (unit === 'scout') return d === 0;
      return true;
    });

    if (unitPlayers.length > 0) {
      const presentBadge = p => isPresent(p.id)
        ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2e8b2e;margin-right:5px;vertical-align:middle"></span>'
        : '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#a83020;margin-right:5px;vertical-align:middle"></span>';

      playersEl.innerHTML =
        '<div style="margin-top:8px">' +
          '<div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);margin-bottom:8px">PLAYERS</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
            unitPlayers.map(p =>
              '<div style="display:flex;align-items:center;padding:4px 8px;background:var(--surface2);border:1px solid var(--rule);font-size:12px">' +
                presentBadge(p) +
                '<span style="font-family:var(--font-mono);color:var(--ink3);font-size:10px;margin-right:5px">#' + p.num + '</span>' +
                '<span style="font-family:var(--font-body);font-weight:600;color:var(--ink)">' + p.name.split(' ')[0] + ' ' + p.name.split(' ').slice(-1)[0] + '</span>' +
              '</div>'
            ).join('') +
          '</div>' +
        '</div>';
    } else {
      playersEl.innerHTML = '';
    }
  }

  // ── Item 2: HC all-group drill summary ────────────────────────────────
  const allDrillsEl = document.getElementById('sidelineAllDrills');
  if (allDrillsEl && currentRole === 'HC') {
    const periodData = (scriptData[currentDay] && scriptData[currentDay][displayStatus.periodIdx]) || {};
    allDrillsEl.innerHTML =
      '<div style="margin-top:8px">' +
        '<div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);margin-bottom:8px">ALL GROUPS</div>' +
        '<div style="display:flex;flex-direction:column;gap:5px">' +
          POS_LIST.map(p => {
            const d = periodData[p] || '—';
            return '<div style="display:flex;gap:8px;align-items:baseline">' +
              '<span style="font-family:var(--font-display);font-size:11px;letter-spacing:.08em;color:var(--royal-dark);min-width:32px">' + p + '</span>' +
              '<span style="font-size:12px;color:var(--ink2);font-family:var(--font-body)">' + d + '</span>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</div>';
  }


  // Check if we need to fire a notification
  checkNotifications(displayStatus);


  // Progress bar
  const pct = Math.round((displayStatus.secsDone / displayStatus.totalSecs) * 100);
  if (barEl) barEl.style.width = pct + '%';

  // Next period
  if (nextEl) {
    const nextRow = SCHEDULE[displayStatus.periodIdx + 1];
    if (nextRow) {
      const nextDrill = (scriptData[currentDay] && scriptData[currentDay][displayStatus.periodIdx + 1] && scriptData[currentDay][displayStatus.periodIdx + 1][pos]) || 'Full team';
      nextEl.innerHTML =
        '<div style="background:var(--surface);border:2px solid var(--royal-dark);border-radius:2px;overflow:hidden;margin-bottom:14px">' +
          '<div style="background:var(--royal-dark);padding:8px 14px;display:flex;align-items:center;justify-content:space-between">' +
            '<span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,0.85)">⏭ NEXT</span>' +
          '</div>' +
          '<div style="padding:12px 14px;display:flex;flex-direction:column;gap:10px">' +
            '<div style="display:flex;align-items:baseline;gap:10px"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);min-width:46px">PERIOD</span><span style="font-family:var(--font-display);font-size:16px;letter-spacing:.06em;color:var(--ink)">' + nextRow.period + '</span></div>' +
            '<div style="display:flex;align-items:baseline;gap:10px"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);min-width:46px">DRILL</span><span style="font-family:var(--font-display);font-size:16px;letter-spacing:.06em;color:var(--ink)">' + nextDrill + '</span></div>' +
            '<div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink4);min-width:46px">UNIT</span><span>' + unitPill(nextRow.unit||'all') + '</span></div>' +
            buildPlayerChips(pos, nextRow) +
          '</div>' +
        '</div>';
    } else {
      nextEl.innerHTML = '<div style="background:var(--surface);border:2px solid var(--royal-dark);border-radius:2px;overflow:hidden;margin-bottom:14px"><div style="background:var(--royal-dark);padding:8px 14px;display:flex;align-items:center;justify-content:space-between"><span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,0.85)">⏭ NEXT</span></div><div style="padding:12px 14px;font-size:13px;color:var(--ink3);font-family:var(--font-body)">Practice complete after this period</div></div>';

function initSidelineSync() {
  if (!db) return;

  if (currentRole !== 'HC') {
    // Position coaches read from Firebase
    onValue(ref(db, 'playscript/practiceStart'), snap => {
      const val = snap.val();

        if (Number(val) !== practiceStartTime) {
          practiceStartTime = Number(val);
          if (currentView === 'sideline') {

      if (currentView === 'sideline') renderSidelineControls();
    });
  }
  // HC never reads practiceStart from Firebase - avoids stale cache entirely
  // HC only writes to Firebase when starting/pausing/resuming/resetting
}

// Load roster from Firebase on login, fall back to generated PLAYERS
function initRoster() {
  if (!db) return;
  onValue(ref(db, 'playscript/roster'), snap => {
    const data = snap.val();
    if (data) {
      // Replace PLAYERS array with Firebase data
      PLAYERS.length = 0;
      Object.values(data).forEach(p => PLAYERS.push(p));
    } else {
      // Seed Firebase with the generated sample players
      const obj = {};
      PLAYERS.forEach(p => { obj[p.id] = p; });
      set(ref(db, 'playscript/roster'), obj);
    }
    if (currentView === 'players' || currentView === 'roster') render();
  });
}

function savePlayer(player) {
  if (db) set(ref(db, 'playscript/roster/' + player.id), player);
  const idx = PLAYERS.findIndex(p => p.id === player.id);
  if (idx >= 0) PLAYERS[idx] = player;
  else PLAYERS.push(player);
}

function deletePlayer(id) {
  if (db) remove(ref(db, 'playscript/roster/' + id));
  const idx = PLAYERS.findIndex(p => p.id === id);
  if (idx >= 0) PLAYERS.splice(idx, 1);
  render();
}

function renderSkillBtns(primary, secondary, weak) {
  const positions = [primary, ...secondary].filter(Boolean);

}


// ── POSITION ROUTING ────────────────────────────────────────────────────────
// Returns the position group a player should report to for a given period type
function playerGroupForType(player, periodType) {
  if (!player) return player.pos;
  const routing = player.routing || {};
  return routing[periodType] || player.primaryPos || player.pos;
}

// Returns true if player should be in the given position group for this period type
function playerInGroup(player, groupPos, periodType) {

function buildDepthSection(existing, primaryPos, secondaryPos) {
  const allPos = [primaryPos, ...(secondaryPos||[])].filter(Boolean);
  if (!allPos.length) return '';
  const depth = (existing && existing.depth) || {};
  const DEPTH_LABELS = {1:'1st Team',2:'2nd Team',3:'3rd Team',0:'Scout Team'};
  const rows = allPos.map(pos => {
    const cur = depth[pos] !== undefined ? depth[pos] : 1;
    const opts = [1,2,3,0].map(v =>
      '<option value="' + v + '"' + (cur===v?' selected':'') + '>' + DEPTH_LABELS[v] + '</option>'
    ).join('');
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">' +
      '<span style="font-family:var(--font-display);font-size:13px;letter-spacing:.06em;color:#000;min-width:50px">' + pos + '</span>' +
      '<select class="type-select" id="depth_' + pos + '" style="min-width:120px">' + opts + '</select>' +
    '</div>';
  }).join('');

  return '<div class="modal-section">' +
    '<label class="field-label">Depth chart <span class="field-hint">unit assignment per position</span></label>' +
    rows +
  '</div>';
}

function buildRoutingSection(existing) {
  const allPos = POS_LIST;
  const hasSecondary = existing && (existing.secondaryPos||[]).length > 0;
  if (!hasSecondary) return ''; // only show routing for multi-position players

  const routing  = existing.routing || {};
  const primary  = existing.primaryPos || existing.pos || '';
  const types    = ['tempo','indy','combo','team'];
  const labels   = {tempo:'Warmup / Conditioning',indy:'Indy periods',combo:'Combo periods',team:'Team periods'};

  const rows = types.map(t => {
    const allPositions = [primary, ...(existing.secondaryPos||[])].filter(Boolean);
    const opts = allPositions.map(p =>
      '<option value="' + p + '"' + ((routing[t]||primary)===p?' selected':'') + '>' + p + '</option>'
    ).join('');
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">' +
      '<span style="font-family:var(--font-body);font-size:12px;color:#000;min-width:160px">' + labels[t] + '</span>' +
      '<select class="type-select" id="routing_' + t + '" style="min-width:80px">' + opts + '</select>' +
    '</div>';
  }).join('');

  return '<div class="modal-section">' +
    '<label class="field-label">Period routing <span class="field-hint">which group does this player join each period?</span></label>' +
    rows +
  '</div>';
}

function getSkillsForPos(positions) {
  const POS_SKILLS = {
    QB:  ['footwork','drop mechanics','pocket presence','reading defenses','short passing','intermediate passing','deep ball','RPO reads'],
    RB:  ['ball security','vision & burst','pass blocking','receiving','route running','blitz pickup','contact balance'],
    WR:  ['route running','releases','hand catching','YAC','blocking','go routes','body control','contested catches'],
    TE:  ['blocking technique','release vs LB','route running','hand catching','seam routes','red zone'],
    OL:  ['stance & start','pass protection','run blocking','footwork','combo blocks','pulling technique','hand placement'],
    DL:  ['first step quickness','hand fighting','gap responsibility','pass rush moves','pursuit angles','tackling','stunts'],
    LB:  ['key & read','pass drops','blitz technique','tackling','pursuit','coverage vs TE','sideline speed'],
    DB:  ['backpedal','hip flip','zone coverage','man coverage','press technique','ball skills','tackling in space'],
    'K/P':['approach & plant','contact point','hang time','direction','kickoff depth','punting form','snapper timing'],
    ST:  ['coverage lanes','gunner technique','return blocking','kickoff approach','punt return vision','wedge setting'],
  };
  const all = new Set();
  positions.forEach(pos => (POS_SKILLS[pos]||[]).forEach(s => all.add(s)));
  return [...all].sort();
}

window.togglePos = function(pos, type) {
  const modal = document.getElementById('playerModal');
  if (!modal) return;
  if (type === 'primary') {
    modal._primaryPos = modal._primaryPos === pos ? '' : pos;
    // Remove from secondary if set as primary
    modal._secondaryPos = modal._secondaryPos.filter(p => p !== pos);
  } else {
    // Secondary: toggle, don't allow if already primary
    if (modal._primaryPos === pos) return;
    const idx = modal._secondaryPos.indexOf(pos);
    if (idx >= 0) modal._secondaryPos.splice(idx, 1);
    else modal._secondaryPos.push(pos);
  }
  // Re-render position buttons — no inline colors, CSS classes only
  const all = POS_LIST;
  document.getElementById('posPrimary').innerHTML = all.map(p => {
    const cls = modal._primaryPos === p ? ' selected-primary' : '';
    return '<button class="pos-btn' + cls + '" onclick="window.togglePos(\'' + p + '\',\'primary\')">' + p + '</button>';
  }).join('');
  document.getElementById('posSecondary').innerHTML = all.map(p => {
    const cls = modal._secondaryPos.includes(p) ? ' selected-secondary' : '';
    return '<button class="pos-btn' + cls + '" onclick="window.togglePos(\'' + p + '\',\'secondary\')">' + p + '</button>';
  }).join('');
  // Re-render skills for new position combo
  document.getElementById('skillsGrid').innerHTML = renderSkillBtns(modal._primaryPos, modal._secondaryPos, modal._weakSkills);
};

window.toggleSkill = function(skill) {
  const modal = document.getElementById('playerModal');
  if (!modal) return;
  const idx = modal._weakSkills.indexOf(skill);
  if (idx >= 0) modal._weakSkills.splice(idx, 1);
  else modal._weakSkills.push(skill);
  document.getElementById('skillsGrid').innerHTML = renderSkillBtns(modal._primaryPos, modal._secondaryPos, modal._weakSkills);
};

window.closePlayerModal = function() {
  const modal = document.getElementById('playerModal');
  if (modal) modal.remove();
  editingPlayerId = null;
};

window.savePlayerFromModal = function() {
  const modal = document.getElementById('playerModal');
  const name = document.getElementById('pName').value.trim();
  const num  = parseInt(document.getElementById('pNum').value) || 0;
  const pos  = modal._primaryPos;

  if (!name) { alert('Please enter a player name.'); return; }
  if (!pos)  { alert('Please select a primary position.'); return; }

  const id = editingPlayerId || ('p_' + Date.now());
  // Build depth chart from modal
  const depth = {};
  const allModalPos = [pos, ...(modal._secondaryPos||[])].filter(Boolean);
  allModalPos.forEach(p => {
    const sel = document.getElementById('depth_' + p);
    if (sel) depth[p] = parseInt(sel.value);
    else depth[p] = 1;
  });

  // Build routing from modal dropdowns
  const routing = {};
  ['tempo','indy','combo','team'].forEach(t => {
    const sel = document.getElementById('routing_' + t);
    if (sel) routing[t] = sel.value;
    else routing[t] = pos;
  });

  const player = {
    id, name, num, pos,
    primaryPos: pos,
    secondaryPos: modal._secondaryPos,
    depth,
    routing,
    weak: modal._weakSkills,
    good: getSkillsForPos([pos, ...modal._secondaryPos]).filter(s => !modal._weakSkills.includes(s))
  };

  savePlayer(player);
  window.closePlayerModal();
  render();
};

function scheduleChanged() {
  // Push updated schedule to Firebase
  if (db) fbSet('schedule', SCHEDULE);
  // Show save confirmation briefly
  const bar = document.getElementById('schedSaveBar');
  if (bar) { bar.style.background='rgba(26,79,196,0.08)'; setTimeout(()=>bar.style.background='',1000); }
}

function addPeriod() {
  const last = SCHEDULE[SCHEDULE.length-1];
  SCHEDULE.push({start:last?last.end:'5:00', end:'5:10', period:'New period', type:'tempo',unit:'all'});
  renderScheduleEditor(document.getElementById('mainContent'));
}

function removePeriod(idx) {
  if (SCHEDULE.length <= 1) return;
  SCHEDULE.splice(idx, 1);
  scheduleChanged();
  renderScheduleEditor(document.getElementById('mainContent'));
}

function movePeriod(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= SCHEDULE.length) return;
  [SCHEDULE[idx], SCHEDULE[newIdx]] = [SCHEDULE[newIdx], SCHEDULE[idx]];
  scheduleChanged();
  renderScheduleEditor(document.getElementById('mainContent'));
}

function updatePeriodField(idx, field, val) {
  SCHEDULE[idx][field] = val;
  scheduleChanged();
  // Refresh just the duration cell
  const durEl = document.getElementById('dur-' + idx);
  if (durEl) durEl.textContent = calcDuration(SCHEDULE[idx].start, SCHEDULE[idx].end);
}

function saveSchedule() {
  scheduleChanged();
  // Re-render script view so it picks up new times
  if (currentView === 'script') render();
  const bar = document.getElementById('schedSaveBar');
  if (bar) {
    const note = bar.querySelector('.sched-note');
    if (note) { note.textContent = 'Saved! Script view updated.'; setTimeout(()=>note.textContent='Changes are applied to the practice script in real time.',2000); }
  }
}

function calcDuration(start, end) {
  function toMins(t) {
    const [h,m] = t.split(':').map(Number);
    return h*60 + m;
  }
  const diff = toMins(end) - toMins(start);
  return diff > 0 ? diff + ' min' : '—';
}

function wbInitCanvas() {
  const wrap   = document.getElementById('wbWrap');
  const canvas = document.getElementById('wbCanvas');
  if (!canvas || !wrap) return;

  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;

  const ctx = canvas.getContext('2d');
  wbDrawField(ctx, canvas.width, canvas.height);
  // Replay all stored strokes
  wbStrokes.forEach(s => wbReplayStroke(ctx, s));

  // Mouse events
  canvas.addEventListener('mousedown',  e => wbPointerDown(e, canvas));
  canvas.addEventListener('mousemove',  e => wbPointerMove(e, canvas));
  canvas.addEventListener('mouseup',    e => wbPointerUp(e, canvas));
  canvas.addEventListener('mouseleave', e => wbPointerUp(e, canvas));

  // Touch events
  canvas.addEventListener('touchstart',  e => { e.preventDefault(); wbPointerDown(e.touches[0], canvas); }, {passive:false});
  canvas.addEventListener('touchmove',   e => { e.preventDefault(); wbPointerMove(e.touches[0], canvas); }, {passive:false});
  canvas.addEventListener('touchend',    e => { e.preventDefault(); wbPointerUp(e.changedTouches[0], canvas); }, {passive:false});
}

function wbDrawField(ctx, w, h) {
  // Green field background
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, 0, w, h);

  // Yard lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  const lines = 10;
  for (let i = 1; i < lines; i++) {
    const x = (w / lines) * i;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  // Hash marks
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  const hashY1 = h * 0.35, hashY2 = h * 0.65;
  for (let i = 0; i <= lines; i++) {
    const x = (w / lines) * i;
    ctx.beginPath(); ctx.moveTo(x-6, hashY1); ctx.lineTo(x+6, hashY1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-6, hashY2); ctx.lineTo(x+6, hashY2); ctx.stroke();
  }
  // Line of scrimmage
  ctx.strokeStyle = 'rgba(255,210,0,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(0, h*0.5); ctx.lineTo(w, h*0.5); ctx.stroke();
  ctx.setLineDash([]);
}

function wbGetPos(e, canvas) {
  const r = canvas.getBoundingClientRect();
  return {
    x: ((e.clientX - r.left) / r.width)  * canvas.width,
    y: ((e.clientY - r.top)  / r.height) * canvas.height
  };
}

function wbPointerDown(e, canvas) {
  const pos = wbGetPos(e, canvas);
  wbStartX = pos.x; wbStartY = pos.y;
  const ctx = canvas.getContext('2d');

  // Football emoji is a stamp — place immediately on click, no drag needed
  if (wbTool === 'football') {
    const size = Math.min(canvas.width, canvas.height) * 0.06;
    ctx.font = size + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏈', pos.x, pos.y);
    // Store as a stroke for sync
    const w = canvas.width, h = canvas.height;
    const stroke = {
      tool: 'football',
      color: '__emoji__',
      size: size / w,
      x0: pos.x / w, y0: pos.y / h,
      x1: pos.x / w, y1: pos.y / h,
      ts: Date.now(),
      by: currentRole
    };
    wbStrokes.push(stroke);
    if (db) push(ref(db, 'playscript/whiteboard/strokes'), stroke);
    return; // no drag tracking needed
  }

  wbDrawing = true;
  if (wbTool === 'pen' || wbTool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  } else {
    wbSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
}

function wbPointerMove(e, canvas) {
  if (!wbDrawing) return;
  const pos = wbGetPos(e, canvas);
  const ctx = canvas.getContext('2d');

  if (wbTool === 'pen') {
    ctx.strokeStyle = wbColor;
    ctx.lineWidth   = wbSize;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (wbTool === 'eraser') {
    ctx.strokeStyle = '#2d5a1b';
    ctx.lineWidth   = wbSize * 4;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else {
    // Shape tools — restore snapshot for clean preview
    ctx.putImageData(wbSnapshot, 0, 0);
    ctx.strokeStyle = wbColor;
    ctx.lineWidth   = wbSize;
    ctx.lineCap     = 'round';
    if (wbTool === 'line') {
      ctx.beginPath();
      ctx.moveTo(wbStartX, wbStartY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else if (wbTool === 'circle') {
      const rx = Math.abs(pos.x - wbStartX) / 2;
      const ry = Math.abs(pos.y - wbStartY) / 2;
      const cx = wbStartX + (pos.x - wbStartX) / 2;
      const cy = wbStartY + (pos.y - wbStartY) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.max(rx,2), Math.max(ry,2), 0, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

function wbPointerUp(e, canvas) {
  if (!wbDrawing) return;
  wbDrawing = false;
  const pos = wbGetPos(e, canvas);
  const ctx = canvas.getContext('2d');

  // Final draw for shapes
  if (wbTool === 'line' || wbTool === 'circle') {
    ctx.putImageData(wbSnapshot, 0, 0);
    ctx.strokeStyle = wbColor;
    ctx.lineWidth   = wbSize;
    ctx.lineCap     = 'round';
    if (wbTool === 'line') {
      ctx.beginPath();
      ctx.moveTo(wbStartX, wbStartY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else {
      const rx = Math.abs(pos.x - wbStartX) / 2;
      const ry = Math.abs(pos.y - wbStartY) / 2;
      const cx = wbStartX + (pos.x - wbStartX) / 2;
      const cy = wbStartY + (pos.y - wbStartY) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.max(rx,2), Math.max(ry,2), 0, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Normalize coords to 0-1 for resolution independence
  const w = canvas.width, h = canvas.height;
  const stroke = {
    tool:   wbTool,
    color:  wbTool === 'eraser' ? '__eraser__' : wbColor,
    size:   wbSize,
    x0: wbStartX / w,  y0: wbStartY / h,
    x1: pos.x / w,     y1: pos.y / h,
    ts: Date.now(),
    by: currentRole
  };

  wbStrokes.push(stroke);

  // Push to Firebase
  if (db) push(ref(db, 'playscript/whiteboard/strokes'), stroke);
}

function wbReplayStroke(ctx, s) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  const x0 = s.x0*w, y0 = s.y0*h, x1 = s.x1*w, y1 = s.y1*h;
  const isEraser = s.color === '__eraser__';

  ctx.strokeStyle = isEraser ? '#2d5a1b' : s.color;
  ctx.lineWidth   = isEraser ? s.size * 4 : s.size;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  if (s.tool === 'football') {
    const emojiSize = (s.size || 0.06) * ctx.canvas.width;
    ctx.font = emojiSize + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏈', x0, y0);
  } else if (s.tool === 'pen' || s.tool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  } else if (s.tool === 'line') {
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  } else if (s.tool === 'circle') {
    const rx = Math.abs(x1-x0)/2, ry = Math.abs(y1-y0)/2;
    const cx = x0+(x1-x0)/2,     cy = y0+(y1-y0)/2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, Math.max(rx,2), Math.max(ry,2), 0, 0, Math.PI*2);
    ctx.stroke();
  }
}

function wbInitSync() {
  if (!db) return;
  // Load and listen for all strokes
  if (wbListener) return; // already listening
  wbListener = onValue(ref(db, 'playscript/whiteboard/strokes'), snap => {
    const val = snap.val();
    wbStrokes = val ? Object.values(val) : [];
    wbStrokes.sort((a,b) => (a.ts||0) - (b.ts||0));
    // Redraw canvas
    const canvas = document.getElementById('wbCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    wbDrawField(ctx, canvas.width, canvas.height);
    wbStrokes.forEach(s => wbReplayStroke(ctx, s));
  });
}

function wbClear() {
  // Use showBanner as confirmation feedback instead of confirm() which blocks on mobile
  wbStrokes = [];
  // Clear Firebase
  if (db) {
    remove(ref(db, 'playscript/whiteboard/strokes'));
  }
  // Redraw field immediately
  const canvas = document.getElementById('wbCanvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    wbDrawField(ctx, canvas.width, canvas.height);
  }
  showBanner('new-period', '✓', 'WHITEBOARD CLEARED', 'Board cleared for all coaches', 3);
}

function handleRosterFile(input) {
  const file = input.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  if (ext === 'csv') {
    reader.onload = e => parseCSVRoster(e.target.result);
    reader.readAsText(file);
  } else if (ext === 'xlsx') {
    reader.onload = e => parseXLSXRoster(e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    alert('Please upload a .csv or .xlsx file.');
  }
  // Reset input so same file can be re-imported
  input.value = '';
}

const VALID_POSITIONS = ['QB','RB','WR','TE','OL','DL','LB','DB','K/P','ST'];

function normalizePos(raw) {
  if (!raw) return '';
  const up = String(raw).trim().toUpperCase();
  return VALID_POSITIONS.find(p => p === up) || '';
}

function parseCSVRoster(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (!lines.length) { alert('File appears to be empty.'); return; }

  // Detect header row
  const firstLower = lines[0].toLowerCase();
  const hasHeader = firstLower.includes('name') || firstLower.includes('jersey') || firstLower.includes('position');
  const dataLines = hasHeader ? lines.slice(1) : lines;

  const players = [];
  const errors  = [];

  dataLines.forEach((line, i) => {
    if (!line) return;
    // Handle quoted CSV values
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g)?.map(c => c.replace(/^"|"$/g,'').trim()) || line.split(',').map(c => c.trim());
    const [numRaw, first, last, primaryRaw, secondaryRaw, weakRaw] = cols;

    const num = parseInt(numRaw);
    const name = ((first||'') + ' ' + (last||'')).trim();
    const primaryPos = normalizePos(primaryRaw);

    if (!name || name === ' ') { errors.push(`Row ${i+2}: missing name`); return; }
    if (!primaryPos) { errors.push(`Row ${i+2} (${name}): invalid position "${primaryRaw}"`); return; }

    const secondaryPos = secondaryRaw
      ? secondaryRaw.split(',').map(s => normalizePos(s.trim())).filter(Boolean)
      : [];
    const weak = weakRaw
      ? weakRaw.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    players.push({
      id: 'p_import_' + Date.now() + '_' + i,
      num: isNaN(num) ? 0 : num,
      name,
      pos: primaryPos,
      primaryPos,
      secondaryPos,
      weak,
      good: []
    });
  });

  confirmImport(players, errors);
}

function parseXLSXRoster(arrayBuffer) {
  // Load SheetJS dynamically if not already loaded
  if (typeof XLSX === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = () => doParseXLSX(arrayBuffer);
    script.onerror = () => alert('Could not load Excel parser. Try saving as CSV instead.');
    document.head.appendChild(script);
  } else {
    doParseXLSX(arrayBuffer);
  }
}

function doParseXLSX(arrayBuffer) {
  const wb    = XLSX.read(arrayBuffer, { type: 'array' });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows  = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

  if (!rows.length) { alert('File appears to be empty.'); return; }

  // Detect header — skip if first col looks like a header
  const firstCell = String(rows[0][0] || '').toLowerCase();
  const hasHeader = isNaN(parseInt(firstCell)) && firstCell !== '';
  const dataRows  = hasHeader ? rows.slice(1) : rows;

  const players = [];
  const errors  = [];

  dataRows.forEach((cols, i) => {
    const [numRaw, first, last, primaryRaw, secondaryRaw, weakRaw] = cols.map(c => String(c||'').trim());
    const num = parseInt(numRaw);
    const name = ((first||'') + ' ' + (last||'')).trim();
    const primaryPos = normalizePos(primaryRaw);

    if (!name || name === ' ') return; // skip blank rows
    if (!primaryPos) { errors.push(`Row ${i+2} (${name}): invalid position "${primaryRaw}"`); return; }

    const secondaryPos = secondaryRaw
      ? secondaryRaw.split(',').map(s => normalizePos(s.trim())).filter(Boolean)
      : [];
    const weak = weakRaw
      ? weakRaw.split(',').map(s => s.trim()).filter(Boolean)
      : [];

    players.push({
      id: 'p_import_' + Date.now() + '_' + i,
      num: isNaN(num) ? 0 : num,
      name,
      pos: primaryPos,
      primaryPos,
      secondaryPos,
      weak,
      good: []
    });
  });

  confirmImport(players, errors);
}

// Temp storage for pending import data (avoids JSON-in-HTML attribute issues)
let pendingImportPlayers = [];

function confirmImport(players, errors) {
  if (!players.length) {
    alert('No valid players found.\n\nErrors:\n' + (errors.join('\n') || 'File may be empty or incorrectly formatted.'));
    return;
  }

  // Store players for executeImport to read
  pendingImportPlayers = players;

  // Calculate merge preview
  const existingByNum = {};
  PLAYERS.forEach(p => { if (p.num) existingByNum[p.num] = p; });
  const toAdd    = players.filter(p => !existingByNum[p.num]);
  const toUpdate = players.filter(p =>  existingByNum[p.num]);
  const toKeep   = PLAYERS.filter(p => !players.find(q => q.num === p.num));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'importModal';

  const errNote = errors.length
    ? `<div style="font-size:11px;color:#a83020;margin-top:8px;font-family:var(--font-body)">${errors.length} row(s) skipped — invalid position or missing name</div>`
    : '';

  overlay.innerHTML =
    '<div class="modal-box" style="max-width:480px">' +
      '<div class="modal-header">' +
        '<span class="modal-title">IMPORT ' + players.length + ' PLAYER' + (players.length !== 1 ? 'S' : '') + '</span>' +
        '<button class="modal-close" onclick="document.getElementById(\'importModal\').remove()">&#x2715;</button>' +
      '</div>' +
      '<div class="modal-body" style="gap:12px">' +
        errNote +
        '<div style="font-size:13px;color:#000;font-family:var(--font-body)">How should the import handle your existing roster?</div>' +
        '<label style="display:flex;align-items:flex-start;gap:12px;padding:14px;border:2px solid var(--rule2);cursor:pointer;background:var(--surface2)" id="importOptReplace">' +
          '<input type="radio" name="importMode" value="replace" style="margin-top:3px;flex-shrink:0">' +
          '<div>' +
            '<div style="font-family:var(--font-display);font-size:14px;letter-spacing:.06em;color:#000">REPLACE ALL</div>' +
            '<div style="font-size:12px;color:#000;font-family:var(--font-body);margin-top:3px">Remove all current players and load only the file. <strong>' + players.length + ' players</strong> will replace the current roster of <strong>' + PLAYERS.length + '</strong>.</div>' +
          '</div>' +
        '</label>' +
        '<label style="display:flex;align-items:flex-start;gap:12px;padding:14px;border:2px solid var(--rule2);cursor:pointer;background:var(--surface2)" id="importOptMerge">' +
          '<input type="radio" name="importMode" value="merge" style="margin-top:3px;flex-shrink:0">' +
          '<div>' +
            '<div style="font-family:var(--font-display);font-size:14px;letter-spacing:.06em;color:#000">ADD / UPDATE</div>' +
            '<div style="font-size:12px;color:#000;font-family:var(--font-body);margin-top:3px">' +
              (toAdd.length    ? '<strong>' + toAdd.length    + ' new</strong> added · ' : '') +
              (toUpdate.length ? '<strong>' + toUpdate.length + '</strong> updated (matched by jersey #) · ' : '') +
              '<strong>' + toKeep.length + '</strong> kept unchanged.' +
            '</div>' +
          '</div>' +
        '</label>' +
      '</div>' +
      '<div class="modal-footer">' +
        '<button class="cancel-btn" onclick="document.getElementById(\'importModal\').remove()">CANCEL</button>' +
        '<button class="save-btn" onclick="window.executeImport()">IMPORT</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Highlight selected option border
  overlay.querySelectorAll('input[name="importMode"]').forEach(radio => {
    radio.addEventListener('change', () => {
      overlay.querySelectorAll('label').forEach(l => l.style.borderColor = 'var(--rule2)');
      radio.closest('label').style.borderColor = 'var(--royal-dark)';
    });
  });
}

function executeImport() {
  const overlay  = document.getElementById('importModal');
  const selected = overlay ? overlay.querySelector('input[name="importMode"]:checked') : null;
  const players  = pendingImportPlayers;

  if (!selected) { alert('Please choose Replace All or Add / Update.'); return; }
  if (!players || !players.length) { alert('No player data to import.'); return; }

  const mode = selected.value;

  if (mode === 'replace') {
    PLAYERS.length = 0;
    players.forEach(p => PLAYERS.push(p));
  } else {
    const existingByNum = {};
    PLAYERS.forEach((p, i) => { if (p.num) existingByNum[p.num] = i; });
    players.forEach(p => {
      if (p.num && existingByNum[p.num] !== undefined) {
        PLAYERS[existingByNum[p.num]] = p;
      } else {
        PLAYERS.push(p);
      }
    });
  }

  if (db) {
    const obj = {};
    PLAYERS.forEach(p => { obj[p.id] = p; });
    set(ref(db, 'playscript/roster'), obj);
  }

  if (overlay) overlay.remove();
  pendingImportPlayers = [];
  rosterSearch = '';
  rosterPosFilter = 'All';
  render();

  showBanner('new-period', '✓',
    (mode === 'replace' ? players.length + ' PLAYERS LOADED' : players.length + ' PLAYERS IMPORTED'),
    mode === 'replace' ? 'Roster replaced successfully' : 'Roster updated successfully',
    5
  );
}

function renderUserGuide(el) {
  const S = 'font-family:var(--font-display);font-size:18px;letter-spacing:.08em;color:var(--royal-dark);margin-bottom:8px';
  const HC = '<span style="display:inline-block;padding:1px 7px;background:var(--royal-dark);color:#fff;font-family:var(--font-display);font-size:10px;letter-spacing:.06em;vertical-align:middle;margin-left:4px">HC ONLY</span>';
  el.innerHTML = `
    <div class="content-header">
      <span class="content-title">USER GUIDE</span>
    </div>
    <div style="max-width:700px;font-family:var(--font-body);font-size:14px;line-height:1.75;color:#000;display:flex;flex-direction:column;gap:28px">

      <div>
        <div style="${S}">WHAT THIS APP IS</div>
        <p>A live, shared practice planning tool for the entire coaching staff. Every coach logs in from their own phone or computer and sees the same practice script in real time. When the Head Coach updates a drill, everyone sees it instantly. When the Head Coach starts the practice clock, every phone counts down together.</p>
        <p>Works in any web browser — no download, no install. On mobile, tap ☰ to open the sidebar menu.</p>
      </div>

      <div>
        <div style="${S}">LOGGING IN</div>
        <p>Open the app and tap your coaching role, then tap <strong>LOGIN</strong>. The Head Coach tile is at the top. Position coaches are in the grid below. Each coach sees only what is relevant to their role — the Head Coach sees everything.</p>
        <p>To switch roles, tap <strong>SWITCH ROLE</strong> in the top right corner. The day of the week is shown in the top bar and can be tapped to change days from a dropdown.</p>
      </div>

      <div>
        <div style="${S}">PRACTICE SCRIPT</div>
        <p>The main planning view. All practice periods are rows, all position groups are columns. Scroll right to see all groups. The Start time, Period name, and Unit assignment are shown for each row.</p>
        <p>Tap any drill cell to edit it. ${HC} can edit every cell. Position coaches can only edit their own group's Indy cells — those appear in bold.</p>
        <p>Changes save automatically and sync to all coaches in real time.</p>
      </div>

      <div>
        <div style="${S}">SIDELINE — THE PRACTICE CLOCK</div>
        <p>Open this view during practice. Every coach should have it on their screen. It shows two cards:</p>
        <ul style="margin:6px 0 6px 20px;display:flex;flex-direction:column;gap:6px">
          <li><strong>▶ NOW</strong> — the current period name, your drill, the unit, your players for this period with rep counts, and a countdown timer</li>
          <li><strong>⏭ NEXT</strong> — the upcoming period name, drill, unit, and players</li>
        </ul>
        <p>Both cards show before the clock starts so coaches know what to expect.</p>

        <p style="margin-top:10px"><strong>Clock controls</strong> ${HC}</p>
        <ul style="margin:6px 0 6px 20px;display:flex;flex-direction:column;gap:5px">
          <li><strong>START PRACTICE</strong> — starts the synchronized countdown on every device</li>
          <li><strong>PAUSE / RESUME</strong> — freezes or restarts the clock on all devices simultaneously</li>
          <li><strong>⏭ SKIP</strong> — immediately ends the current period and advances to the next</li>
          <li><strong>+2m / +5m</strong> — adds time to the current period</li>
          <li><strong>RESET</strong> — clears the clock and all period offsets</li>
          <li><strong>⛈ WEATHER</strong> — pauses practice and sends a hold alert to all coaches. Tap CLEAR HOLD to resume.</li>
        </ul>

        <p style="margin-top:10px"><strong>Injury flag</strong> — available to all coaches. Tap <strong>🚑 INJURY</strong> in the top bar to open the player search. Type a jersey number or name, select the player, and tap ALERT ALL COACHES. A red banner fires on every device immediately.</p>

        <p style="margin-top:10px"><strong>Rep counting</strong> — tap any player chip in the NOW card to add a rep. The count updates in place. Hold for half a second (or right-click on desktop) to subtract a rep if you tap by mistake. See the Rep Counter view for a full summary.</p>

        <p style="margin-top:10px"><strong>Notifications</strong> — 15 seconds before a period ends, an orange banner appears on every device. A new period banner fires when the clock advances. Allow notifications when prompted to receive alerts even when the app is in the background (iPhone requires the app saved to the home screen first).</p>
      </div>

      <div>
        <div style="${S}">POSITION UNIT VIEW</div>
        <p>Your personal view for practice. Shows all players in your position group organized by depth chart unit: 1ST TEAM, 2ND TEAM, 3RD TEAM, SCOUT TEAM. Multi-position players who route to your group for any period type also appear here with their routing chips showing where they go each period type.</p>
        <p>Tap <strong>HERE</strong> or <strong>ABSENT</strong> on any player card to take attendance. The change syncs to all coaches immediately.</p>
      </div>

      <div>
        <div style="${S}">FULL ROSTER</div>
        <p>The complete player list sorted by jersey number. Filter by position using the buttons at the top. The attendance status for each player is shown — tap HERE or ABSENT to update. The subtitle shows how many players are present.</p>
      </div>

      <div>
        <div style="${S}">DEPTH CHART</div>
        <p>A period-by-period routing table for multi-position players in your group. Each column is a player, each row is a period. Highlighted cells show when that player reports to your group. Useful for knowing which players to expect and when during Combo and Team periods.</p>
      </div>

      <div>
        <div style="${S}">REP COUNTER</div>
        <p>A tally of reps earned by each player for the current day. Sorted by most reps so you can immediately see who is getting the most work and who has zero reps. Position coaches see only their group. ${HC} sees the full roster.</p>
        <p>Reps are tracked by tapping player chips on the Sideline view. The Rep Counter view shows the full leaderboard with a load bar. Orange bar = most reps in the group. ${HC} can reset the day's reps with the RESET DAY button.</p>
        <p>Rep data is stored per day — switching to Tuesday loads Tuesday's reps, Monday's data is preserved separately.</p>
      </div>

      <div>
        <div style="${S}">WHITEBOARD</div>
        <p>A shared drawing canvas for live play diagrams. Any coach can draw. All coaches see the drawing update in real time. The field background shows yard lines and a dashed line of scrimmage.</p>
        <ul style="margin:6px 0 6px 20px;display:flex;flex-direction:column;gap:5px">
          <li><strong>✏ PEN</strong> — freehand draw with finger or mouse</li>
          <li><strong>╱ LINE</strong> — drag to draw a straight route line</li>
          <li><strong>○ CIRCLE</strong> — drag to draw a player circle or zone</li>
          <li><strong>⌫ ERASE</strong> — erase strokes</li>
          <li><strong>🏈</strong> — tap anywhere to stamp a football</li>
          <li><strong>✕ CLEAR</strong> — wipes the board for all coaches</li>
        </ul>
        <p>Six colors and four brush sizes are available in the toolbar.</p>
      </div>

      <div>
        <div style="${S}">EDIT ROSTER ${HC}</div>
        <p>Add, edit, and remove players. Tap <strong>+ ADD PLAYER</strong> or <strong>EDIT</strong> on any row. For each player you can set:</p>
        <ul style="margin:6px 0 6px 20px;display:flex;flex-direction:column;gap:5px">
          <li><strong>Jersey number and name</strong></li>
          <li><strong>Primary position</strong> — their main group</li>
          <li><strong>Secondary positions</strong> — groups they also participate in</li>
          <li><strong>Depth chart rank</strong> — 1st Team, 2nd Team, 3rd Team, or Scout per position</li>
          <li><strong>Period routing</strong> — which group they join for Indy, Combo, and Team periods (only shown for multi-position players)</li>
          <li><strong>Weak areas</strong> — flagged in position coach cards and the Sideline watch list</li>
        </ul>
        <p><strong>⬆ IMPORT FILE</strong> — upload a CSV or XLSX file to load your roster in bulk. Choose Replace All (wipes current roster) or Add / Update (merges by jersey number). Download the template from Help → Roster Template.</p>
        <p><strong>✓ ALL PRESENT</strong> — resets all players to present. Use at the start of each practice before taking attendance.</p>
      </div>

      <div>
        <div style="${S}">EDIT SCHEDULE ${HC}</div>
        <p>Set the practice structure — period times, names, types (Warmup / Indy / Combo / Team), and unit assignments (All / 1st Team / 2nd Team / 3rd Team / Scout). The same schedule applies every day — what changes daily is the drills entered in the Practice Script.</p>
        <p>Use ▲▼ to reorder periods, + ADD PERIOD to add new ones, and <strong>SAVE & APPLY</strong> to push changes to the script immediately.</p>
      </div>

      <div>
        <div style="${S}">LIMITATIONS TO KNOW</div>
        <ul style="margin:6px 0 6px 20px;display:flex;flex-direction:column;gap:8px">
          <li><strong>One schedule for all days:</strong> The same period structure applies Monday through Sunday. Edit it before practice if your schedule changes.</li>
          <li><strong>No login security:</strong> Anyone with the URL can log in as any role. Share the link only with your staff.</li>
          <li><strong>iPhone notifications:</strong> Require iOS 16.4+ and the app saved to the home screen — tap Share → Add to Home Screen. This is an Apple limitation.</li>
          <li><strong>Rep tracking is manual:</strong> Reps are counted by tapping during practice. The more consistently coaches tap, the more accurate the data.</li>
          <li><strong>Firebase required for sync:</strong> Without a Firebase connection each coach sees only their own local version. All real-time features require the app to be deployed online.</li>
        </ul>
      </div>

    </div>`;
}
window.doLogout     = doLogout;
window.setView      = setView;
window.setDay       = setDay;
window.toggleDayDropdown = toggleDayDropdown;
window.pickDay      = pickDay;
window.toggleSidebar    = toggleSidebar;
window.toggleAttendance  = toggleAttendance;
window.markAllPresent    = markAllPresent;
window.updateDrill  = updateDrill;
window.setPlayerFilter    = setPlayerFilter;
window.renderPlayers      = renderPlayers;
window.setRosterSearch    = setRosterSearch;
window.setRosterPosFilter = setRosterPosFilter;
window.openAddPlayer      = openAddPlayer;
window.editPlayer             = editPlayer;
window.confirmDeletePlayer    = confirmDeletePlayer;
</script>
</body>
</html>
